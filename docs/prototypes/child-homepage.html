<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>孩子端首页原型</title>
  <style>
    :root {
      --bg-top: #fff5d7;
      --bg-bottom: #f4f8ff;
      --paper: rgba(255, 251, 241, 0.88);
      --paper-strong: rgba(255, 248, 230, 0.96);
      --line: rgba(78, 53, 28, 0.12);
      --ink: #2c221d;
      --muted: #6f6256;
      --brand: #ff7a37;
      --brand-deep: #de5416;
      --gold: #ffc54d;
      --sky: #3da6ff;
      --teal: #1fbead;
      --mint: #dcfff4;
      --success: #2eb769;
      --danger: #ff825b;
      --shadow-lg: 0 28px 60px rgba(163, 93, 13, 0.16);
      --shadow-md: 0 16px 30px rgba(77, 58, 24, 0.12);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --content-width: 1280px;
      font-family: "Segoe UI Variable Display", "Trebuchet MS", "Microsoft YaHei UI", sans-serif;
      color: var(--ink);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 208, 114, 0.75), transparent 22%),
        radial-gradient(circle at 85% 12%, rgba(61, 166, 255, 0.3), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255, 122, 55, 0.14), transparent 24%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.4), transparent 82%);
    }

    .app-shell {
      width: min(var(--content-width), calc(100vw - 32px));
      margin: 24px auto 40px;
      display: grid;
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--paper);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow-md);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(200px, 260px) 1fr minmax(220px, 320px);
      gap: 18px;
      padding: 16px 18px;
      align-items: center;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      color: #fff;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.46), transparent 28%),
        linear-gradient(145deg, #ff954f, #f75d25);
      box-shadow: 0 16px 26px rgba(247, 93, 37, 0.28);
      font-size: 1.8rem;
      font-weight: 900;
    }

    .profile-label {
      display: grid;
      gap: 3px;
    }

    .overline {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero-name {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1;
      font-weight: 900;
    }

    .subtle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .is-helper-copy {
      display: none;
    }

    .top-stats {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat-pill {
      min-width: 92px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
      display: grid;
      gap: 2px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 900;
    }

    .day-strip {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .day-chip {
      border: 1px solid rgba(85, 58, 24, 0.12);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--ink);
      padding: 12px 8px 12px;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 4px;
      text-align: center;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      position: relative;
      overflow: hidden;
    }

    .day-chip:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(36, 28, 18, 0.08);
    }

    .day-chip.is-selected {
      border-color: rgba(255, 122, 55, 0.42);
      background:
        linear-gradient(180deg, rgba(255, 248, 228, 0.96), rgba(255, 233, 190, 0.9));
      box-shadow: 0 18px 30px rgba(255, 122, 55, 0.22);
      transform: translateY(-2px);
    }

    .day-top-slot {
      width: 100%;
      min-height: 4px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      overflow: visible;
      margin-bottom: 2px;
    }

    .day-today-tag {
      position: absolute;
      left: 50%;
      top: -10px;
      transform: translateX(-50%);
      min-width: 38px;
      padding: 3px 6px 3px;
      border-radius: 0 0 8px 8px;
      background: linear-gradient(180deg, rgba(255, 245, 210, 0.98), rgba(255, 229, 170, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        0 6px 10px rgba(215, 153, 49, 0.12);
      font-size: 0.42rem;
      font-weight: 900;
      color: #9a5f10;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .day-name {
      font-size: 1rem;
      font-weight: 900;
    }

    .day-date {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .day-state {
      margin-top: 4px;
      min-width: 54px;
      padding: 6px 9px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.74rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.02em;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .day-state.is-pending {
      background: rgba(255, 236, 193, 0.95);
      color: #9a6717;
    }

    .day-state.is-active {
      background: rgba(206, 245, 242, 0.98);
      color: #0f6f73;
    }

    .day-state.is-complete {
      background: rgba(255, 225, 186, 0.96);
      color: #ae5517;
    }

    .day-state.is-future {
      background: rgba(225, 233, 244, 0.96);
      color: #52698c;
    }

    .day-state.is-locked {
      background: rgba(236, 232, 224, 0.94);
      color: #7c705f;
    }

    .day-state.is-rest {
      background: rgba(220, 241, 228, 0.96);
      color: #477463;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(340px, 420px);
      gap: 18px;
      align-items: stretch;
    }

    .stage {
      padding: 22px;
      position: relative;
      overflow: hidden;
      min-height: 530px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 196, 82, 0.34), transparent 26%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.2));
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.46);
      pointer-events: none;
    }

    .stage-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .badge-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .season-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 14px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.85);
      color: var(--ink);
      font-weight: 900;
      font-size: 0.92rem;
      box-shadow: 0 10px 20px rgba(36, 28, 18, 0.07);
    }

    .pet-stage {
      margin-top: 6px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .pet-wrap {
      --element-main: #ffb85e;
      --element-mid: #ff7c37;
      --element-deep: #d94c18;
      --element-soft: #fff0cb;
      --element-accent: #ffd35d;
      --element-glow: rgba(255, 196, 82, 0.54);
      --element-glow-soft: rgba(255, 196, 82, 0.08);
      --element-ring: rgba(255, 226, 164, 0.34);
      --element-ring-shadow: rgba(255, 193, 84, 0.08);
      --element-ring-bloom: rgba(255, 169, 54, 0.12);
      --element-disc: rgba(73, 45, 18, 0.24);
      --spark-light: rgba(255, 250, 199, 0.95);
      --spark-deep: rgba(255, 193, 56, 0.85);
      --spark-shadow: rgba(255, 196, 82, 0.4);
      --wing-light: rgba(255, 236, 195, 0.9);
      --wing-mid: rgba(255, 176, 71, 0.96);
      --wing-deep: rgba(231, 90, 29, 0.98);
      --armor-light: rgba(255, 240, 205, 0.96);
      --armor-mid: rgba(255, 197, 77, 0.92);
      --armor-deep: rgba(248, 103, 47, 0.94);
      --element-ring-style: solid;
      --element-ring-width: 2px;
      position: relative;
      display: grid;
      justify-items: center;
      align-content: end;
      min-height: 410px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
      padding: 18px 0 10px;
    }

    .pet-aura {
      position: absolute;
      width: 92%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, var(--element-glow), var(--element-glow-soft) 58%, transparent 72%);
      filter: blur(10px);
      opacity: 0.9;
      animation: aura-pulse 4.6s ease-in-out infinite;
    }

    .pet-disc {
      position: absolute;
      bottom: 22px;
      width: 76%;
      height: 42px;
      border-radius: 999px;
      background: radial-gradient(circle, var(--element-disc), transparent 72%);
      filter: blur(8px);
    }

    .pet-energy-ring {
      position: absolute;
      inset: 88px 50px 44px;
      border-radius: 50%;
      border: var(--element-ring-width) var(--element-ring-style) var(--element-ring);
      box-shadow:
        0 0 0 10px var(--element-ring-shadow),
        0 0 28px var(--element-ring-bloom);
      opacity: 0.28;
      transform: scale(0.94);
      animation: ring-spin 10s linear infinite;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .pet-stage-tag {
      position: absolute;
      left: 0;
      top: 10px;
      border-radius: 999px;
      padding: 9px 16px;
      background: rgba(37, 27, 18, 0.8);
      color: #fff3db;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.8rem;
      box-shadow: 0 12px 22px rgba(37, 27, 18, 0.18);
    }

    .pet-feedback {
      position: absolute;
      right: 28px;
      top: 88px;
      min-width: 104px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(46, 31, 18, 0.84);
      color: #fff5e2;
      font-size: 0.84rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-align: center;
      box-shadow: 0 16px 30px rgba(46, 31, 18, 0.16);
      opacity: 0;
      transform: translateY(10px) scale(0.92);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      z-index: 3;
    }

    .pet-feedback.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: feedback-float 1.4s ease-out;
    }

    .pet-feedback[data-tone="growth"] {
      background: linear-gradient(180deg, rgba(255, 134, 54, 0.96), rgba(222, 84, 22, 0.94));
    }

    .pet-feedback[data-tone="crystal"] {
      background: linear-gradient(180deg, rgba(69, 138, 255, 0.96), rgba(30, 77, 189, 0.94));
    }

    .pet-feedback[data-tone="evolve"] {
      background: linear-gradient(180deg, rgba(72, 40, 159, 0.96), rgba(32, 112, 214, 0.94));
    }

    .pet-feedback[data-tone="element"] {
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--element-accent) 78%, white 22%), color-mix(in srgb, var(--element-mid) 86%, #17355d 14%));
      color: #fffaf0;
    }

    .pet-feedback[data-tone="warn"] {
      background: linear-gradient(180deg, rgba(53, 43, 35, 0.96), rgba(27, 20, 16, 0.94));
    }

    .pet-confetti {
      position: absolute;
      inset: 40px 74px 130px;
      pointer-events: none;
      z-index: 2;
    }

    .pet-confetti span {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 5px;
      opacity: 0;
      background: linear-gradient(180deg, rgba(255, 247, 196, 0.96), rgba(255, 190, 67, 0.92));
      box-shadow: 0 0 16px rgba(255, 193, 84, 0.24);
    }

    .pet-confetti span:nth-child(1) {
      left: 12%;
      bottom: 4%;
      animation-delay: -0.1s;
    }

    .pet-confetti span:nth-child(2) {
      left: 32%;
      bottom: 18%;
      background: linear-gradient(180deg, rgba(255, 178, 91, 0.96), rgba(255, 115, 44, 0.92));
      animation-delay: 0.12s;
    }

    .pet-confetti span:nth-child(3) {
      right: 34%;
      bottom: 10%;
      background: linear-gradient(180deg, rgba(132, 232, 255, 0.96), rgba(47, 182, 227, 0.92));
      animation-delay: 0.22s;
    }

    .pet-confetti span:nth-child(4) {
      right: 14%;
      bottom: 24%;
      animation-delay: 0.32s;
    }

    .pet-core {
      --stage-zoom: 1;
      --body-scale: 1;
      --body-lift: 0px;
      --head-scale: 1;
      --head-y: 0px;
      --horn-scale: 0.7;
      --horn-opacity: 1;
      --wing-scale: 0;
      --wing-opacity: 0;
      --wing-top: 112px;
      --armor-opacity: 0;
      --crown-opacity: 0;
      --spark-opacity: 0.24;
      --tail-scale: 1;
      --tail-rotate: 26deg;
      width: clamp(270px, 30vw, 360px);
      height: clamp(270px, 30vw, 360px);
      position: relative;
      transform: translateY(0) scale(var(--stage-zoom));
      transform-origin: center bottom;
      transition: transform 220ms ease, filter 220ms ease;
      animation: pet-bob 3.6s ease-in-out infinite;
      filter: drop-shadow(0 28px 42px rgba(226, 90, 22, 0.22));
    }

    .pet-core::before,
    .pet-core::after {
      content: "";
      position: absolute;
      pointer-events: none;
      opacity: 0;
    }

    .pet-core::before {
      inset: 30px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--element-glow) 78%, white 22%), transparent 70%);
      filter: blur(18px);
    }

    .pet-core::after {
      inset: 28px 18px 62px;
      border-radius: 48px;
      background:
        linear-gradient(
          115deg,
          transparent 0 18%,
          color-mix(in srgb, var(--element-accent) 88%, white 12%) 40%,
          color-mix(in srgb, var(--element-mid) 86%, white 14%) 52%,
          transparent 76%
        );
      mix-blend-mode: screen;
      transform: translateX(-28%) rotate(-12deg) scale(0.82);
    }

    .pet-core.is-element-shifting::before {
      animation: element-shift-flash 860ms ease-out;
    }

    .pet-core.is-element-shifting::after {
      animation: element-shift-sweep 860ms ease-out;
    }

    .pet-wrap.is-element-shifting .pet-energy-ring {
      opacity: 0.68;
      transform: scale(1.05);
    }

    .pet-wrap.is-element-shifting .pet-tail-flame {
      filter: brightness(1.16);
    }

    .pet-core.is-happy {
      transform: translateY(-8px) scale(calc(var(--stage-zoom) * 1.03));
      filter: drop-shadow(0 34px 50px rgba(226, 90, 22, 0.3));
    }

    .pet-core.is-evolving {
      animation: evolve-burst 0.85s ease-in-out 2;
    }

    .pet-core[data-stage="1"] {
      --stage-zoom: 0.76;
      --body-scale: 0.9;
      --body-lift: 8px;
      --head-scale: 1.1;
      --head-y: -2px;
      --horn-scale: 0;
      --horn-opacity: 0;
      --wing-scale: 0;
      --wing-opacity: 0;
      --wing-top: 126px;
      --armor-opacity: 0;
      --crown-opacity: 0;
      --spark-opacity: 0.14;
      --tail-scale: 0.86;
      --tail-rotate: 20deg;
    }

    .pet-core[data-stage="2"] {
      --stage-zoom: 0.92;
      --body-scale: 0.98;
      --body-lift: 2px;
      --head-scale: 1.04;
      --head-y: -1px;
      --horn-scale: 0.62;
      --horn-opacity: 0.9;
      --wing-scale: 0;
      --wing-opacity: 0;
      --wing-top: 118px;
      --armor-opacity: 0;
      --crown-opacity: 0;
      --spark-opacity: 0.26;
      --tail-scale: 0.98;
      --tail-rotate: 24deg;
    }

    .pet-core[data-stage="3"] {
      --stage-zoom: 1.08;
      --body-scale: 1.06;
      --body-lift: -4px;
      --head-scale: 0.98;
      --head-y: -4px;
      --horn-scale: 0.96;
      --horn-opacity: 1;
      --wing-scale: 0.98;
      --wing-opacity: 0.9;
      --wing-top: 98px;
      --armor-opacity: 0.28;
      --crown-opacity: 0;
      --spark-opacity: 0.4;
      --tail-scale: 1.08;
      --tail-rotate: 28deg;
    }

    .pet-core[data-stage="4"] {
      --stage-zoom: 1.22;
      --body-scale: 1.12;
      --body-lift: -10px;
      --head-scale: 0.95;
      --head-y: -6px;
      --horn-scale: 1.08;
      --horn-opacity: 1;
      --wing-scale: 1.16;
      --wing-opacity: 0.94;
      --wing-top: 86px;
      --armor-opacity: 0.78;
      --crown-opacity: 0;
      --spark-opacity: 0.56;
      --tail-scale: 1.18;
      --tail-rotate: 30deg;
    }

    .pet-core[data-stage="5"] {
      --stage-zoom: 1.36;
      --body-scale: 1.18;
      --body-lift: -18px;
      --head-scale: 0.92;
      --head-y: -10px;
      --horn-scale: 1.18;
      --horn-opacity: 1;
      --wing-scale: 1.28;
      --wing-opacity: 1;
      --wing-top: 74px;
      --armor-opacity: 1;
      --crown-opacity: 1;
      --spark-opacity: 0.78;
      --tail-scale: 1.28;
      --tail-rotate: 34deg;
    }

    .pet-core[data-mode="rest"] .pet-eye {
      transform: scaleY(0.82);
    }

    .pet-core[data-mode="hungry"] .pet-head,
    .pet-core[data-mode="evolve"] .pet-head {
      transform: translateX(-50%) translateY(calc(var(--head-y) - 4px)) scale(var(--head-scale)) rotate(-2deg);
    }

    .pet-core[data-mode="complete"] .pet-wing,
    .pet-core[data-mode="evolve"] .pet-wing {
      animation-duration: 2.2s;
    }

    .pet-wrap[data-mode="rest"] .pet-core {
      animation-duration: 4.8s;
      filter: drop-shadow(0 18px 32px rgba(226, 90, 22, 0.16));
    }

    .pet-wrap[data-mode="rest"] .pet-aura {
      animation-duration: 6s;
      opacity: 0.72;
    }

    .pet-wrap[data-mode="rest"] .pet-tail-flame {
      animation-duration: 1.8s;
      opacity: 0.84;
    }

    .pet-wrap[data-mode="rest"] .pet-energy-ring {
      opacity: 0.16;
      transform: scale(0.9);
    }

    .pet-wrap[data-mode="idle"] .pet-core {
      filter: drop-shadow(0 28px 42px rgba(226, 90, 22, 0.22));
    }

    .pet-wrap[data-mode="idle"] .pet-tail {
      animation-duration: 2.6s;
    }

    .pet-wrap[data-mode="ready"] .pet-core {
      animation-duration: 2.7s;
      filter: drop-shadow(0 30px 48px rgba(226, 90, 22, 0.28));
    }

    .pet-wrap[data-mode="ready"] .pet-tail {
      animation-duration: 1.9s;
    }

    .pet-wrap[data-mode="ready"] .pet-tail-flame {
      animation-duration: 0.96s;
      box-shadow: 0 0 34px color-mix(in srgb, var(--element-ring-bloom) 85%, white 15%);
    }

    .pet-wrap[data-mode="ready"] .pet-energy-ring {
      opacity: 0.42;
      transform: scale(0.99);
    }

    .pet-wrap[data-mode="hungry"] .pet-core {
      animation: pet-bob-hungry 1.9s ease-in-out infinite;
      filter: drop-shadow(0 34px 50px rgba(226, 90, 22, 0.32));
    }

    .pet-wrap[data-mode="hungry"] .pet-head {
      transform: translateX(-50%) translateY(calc(var(--head-y) - 8px)) scale(var(--head-scale)) rotate(-4deg);
    }

    .pet-wrap[data-mode="hungry"] .pet-tail {
      animation-duration: 1.45s;
    }

    .pet-wrap[data-mode="hungry"] .pet-aura {
      opacity: 1;
      filter: blur(12px);
    }

    .pet-wrap[data-mode="hungry"] .pet-energy-ring {
      opacity: 0.62;
      transform: scale(1.02);
      box-shadow:
        0 0 0 12px color-mix(in srgb, var(--element-ring-shadow) 90%, transparent),
        0 0 36px color-mix(in srgb, var(--element-ring-bloom) 88%, transparent);
    }

      color: var(--muted);
      background: rgba(255, 251, 239, 0.92);
      border-style: dashed;
      border-color: rgba(160, 124, 82, 0.34);
      box-shadow: none;
    }

    .reward-drop-icon {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.72);
      font-size: 1rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .reward-drop-copy {
      display: grid;
      gap: 1px;
      line-height: 1.1;
    }

    .reward-drop-copy small {
      color: rgba(138, 63, 17, 0.72);
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .reward-overflow {
      position: absolute;
      right: 14px;
      top: 14px;
      padding: 7px 9px;
      border-radius: 999px;
      background: linear-gradient(180deg, #2ec5b4, #149785);
      color: #f4fffd;
      font-size: 0.8rem;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(20, 151, 133, 0.18);
    }

    .reward-copy {
      min-height: 22px;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .reward-banner.is-feeding .reward-drop:first-child {
      animation: tray-launch 420ms ease-out forwards;
    }

    .reward-action {
      margin-top: 12px;
      display: block;
    }

    .feed-button {
      width: 100%;
      padding: 14px 18px;
      background: linear-gradient(180deg, #1ecdb8, #0ea492);
      box-shadow: 0 14px 24px rgba(14, 164, 146, 0.24);
    }

    .feed-button.pet-feed-shortcut {
      width: auto;
      padding: 10px 10px;
    }

    .growth-track {
      height: 22px;
      border-radius: 999px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(134, 77, 21, 0.28), rgba(255, 255, 255, 0.28)),
        rgba(255, 250, 236, 0.82);
      border: 1px solid rgba(255, 220, 158, 0.84);
      box-shadow:
        inset 0 3px 8px rgba(96, 66, 32, 0.18),
        inset 0 -1px 0 rgba(255, 255, 255, 0.72),
        0 8px 18px rgba(255, 167, 58, 0.14);
      position: relative;
    }

    .growth-track::before {
      content: "";
      position: absolute;
      inset: 3px 8px;
      border-radius: 999px;
      background:
        repeating-linear-gradient(90deg, rgba(255, 175, 53, 0.22) 0 10px, transparent 10px 22px);
      opacity: 0.45;
      pointer-events: none;
    }

    .growth-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background:
        linear-gradient(90deg, #ff842f 0%, #ffb743 26%, #ffe16b 58%, #23d8bf 100%);
      transition: width 180ms ease;
      position: relative;
      box-shadow:
        0 0 18px rgba(255, 188, 77, 0.28),
        inset 0 0 14px rgba(255, 255, 255, 0.24);
    }

    .growth-fill.is-pulsing {
      animation: rail-pulse 560ms ease-out;
    }

    .growth-fill::after {
      content: "";
      position: absolute;
      top: 0;
      right: 8px;
      bottom: 0;
      width: 22px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.64), transparent);
      opacity: 0.75;
    }

    .growth-stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 700;
    }

    .mini-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .bottom-growth-side {
      display: grid;
      justify-items: end;
      align-content: start;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .mini-badge {
      min-width: 86px;
      padding: 10px 12px;
      display: inline-grid;
      gap: 2px;
      justify-items: start;
    }

    .mini-badge-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(111, 98, 86, 0.9);
    }

    .mini-badge-value {
      font-size: 1.02rem;
      font-weight: 900;
      color: var(--ink);
      line-height: 1;
    }

    .flying-drop {
      position: fixed;
      left: 0;
      top: 0;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 248, 221, 0.98), rgba(255, 222, 163, 0.94));
      box-shadow:
        0 16px 28px rgba(165, 91, 18, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);
      font-size: 1.2rem;
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.86);
      transition: transform 760ms cubic-bezier(0.2, 0.76, 0.2, 1), opacity 760ms ease;
    }

    .flying-drop.is-flying {
      opacity: 1;
      transform: translate(calc(-50% + var(--fly-x)), calc(-50% + var(--fly-y))) scale(0.62) rotate(-18deg);
    }

    .evolution-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(28, 18, 10, 0.46);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 40;
      padding: 20px;
    }

    .evolution-modal.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .evolution-modal-panel {
      width: min(980px, calc(100vw - 32px));
      max-height: min(86vh, 900px);
      overflow: auto;
      border-radius: 32px;
      padding: 24px 24px 22px;
      background:
        radial-gradient(circle at 15% 12%, rgba(255, 213, 92, 0.22), transparent 22%),
        linear-gradient(180deg, rgba(255, 249, 236, 0.98), rgba(255, 240, 215, 0.98));
      border: 1px solid rgba(255, 233, 180, 0.82);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.74),
        0 30px 60px rgba(43, 27, 10, 0.2);
      position: relative;
    }

    .evolution-modal-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      margin-bottom: 20px;
    }

    .evolution-modal-top h3 {
      margin: 6px 0 0;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      letter-spacing: -0.04em;
    }

    .evolution-modal-copy {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 620px;
      line-height: 1.55;
    }

    .modal-close {
      border: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      font-size: 1.4rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 24px rgba(44, 31, 16, 0.08);
    }

    .evolution-rail {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      align-items: start;
      position: relative;
    }

    .evolution-rail::before {
      content: "";
      position: absolute;
      left: 9%;
      right: 9%;
      top: 92px;
      height: 8px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(255, 165, 66, 0.2), rgba(255, 211, 86, 0.52), rgba(41, 211, 183, 0.18));
      box-shadow: 0 0 18px rgba(255, 186, 65, 0.16);
      z-index: 0;
    }

    .evolution-card {
      position: relative;
      z-index: 1;
      padding: 14px 12px 16px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 22px rgba(50, 34, 17, 0.07);
      text-align: center;
      min-height: 330px;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 10px;
    }

    .evolution-card.is-current {
      background:
        linear-gradient(180deg, rgba(255, 245, 220, 0.98), rgba(255, 231, 187, 0.94));
      border-color: rgba(255, 192, 83, 0.62);
      box-shadow:
        0 18px 30px rgba(255, 171, 58, 0.14),
        0 0 0 2px rgba(255, 214, 114, 0.28);
      transform: translateY(-8px);
    }

    .evolution-card.is-unlocked {
      background:
        linear-gradient(180deg, rgba(255, 253, 243, 0.96), rgba(255, 242, 211, 0.92));
    }

    .evolution-card.is-locked {
      background:
        linear-gradient(180deg, rgba(249, 244, 232, 0.88), rgba(239, 231, 213, 0.82));
    }

    .evolution-state {
      justify-self: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #916113;
    }

    .evolution-avatar {
      width: 118px;
      height: 118px;
      margin: 0 auto;
      border-radius: 34px;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.5), transparent 16%),
        linear-gradient(180deg, #ffb55c, #ff7a35 58%, #db4d18);
      display: grid;
      place-items: center;
      position: relative;
      box-shadow:
        inset 0 8px 14px rgba(255, 255, 255, 0.22),
        0 14px 24px rgba(226, 90, 22, 0.18);
    }

    .evolution-avatar::before,
    .evolution-avatar::after {
      content: "";
      position: absolute;
      top: 12px;
      width: 18px;
      height: 28px;
      border-radius: 70% 70% 0 100%;
      background: linear-gradient(180deg, #ffeeb8, #ffc44d 64%, #f47c22);
      box-shadow: inset 0 4px 6px rgba(255, 255, 255, 0.22);
    }

    .evolution-avatar::before {
      left: 22px;
      transform: rotate(-26deg);
    }

    .evolution-avatar::after {
      right: 22px;
      transform: scaleX(-1) rotate(-26deg);
    }

    .evolution-avatar.stage-1::before,
    .evolution-avatar.stage-1::after {
      transform: scale(0.7) rotate(-26deg);
      opacity: 0.4;
    }

    .evolution-avatar.stage-5 {
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.54), transparent 16%),
        linear-gradient(180deg, #ffd66b, #ff9340 58%, #c94918);
    }

    .evolution-face {
      width: 68px;
      height: 64px;
      border-radius: 50% 50% 42% 42%;
      background:
        radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.4), transparent 16%),
        linear-gradient(180deg, #ffbc60, #ff8240 58%, #dd5821);
      position: relative;
      box-shadow: inset 0 6px 10px rgba(255, 255, 255, 0.18);
    }

    .evolution-face::before,
    .evolution-face::after {
      content: "";
      position: absolute;
      top: 20px;
      width: 12px;
      height: 16px;
      border-radius: 999px;
      background: #fff7ed;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.36);
    }

    .evolution-face::before {
      left: 14px;
    }

    .evolution-face::after {
      right: 14px;
    }

    .evolution-face .evo-eye-core {
      position: absolute;
      top: 24px;
      left: 20px;
      width: 28px;
      height: 14px;
    }

    .evolution-face .evo-eye-core::before,
    .evolution-face .evo-eye-core::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 10px;
      border-radius: 999px;
      background: #291812;
      top: 0;
    }

    .evolution-face .evo-eye-core::before {
      left: 0;
    }

    .evolution-face .evo-eye-core::after {
      right: 0;
    }

    .evolution-lock {
      width: 118px;
      height: 118px;
      margin: 0 auto;
      border-radius: 34px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(100, 91, 79, 0.18), rgba(245, 235, 215, 0.78));
      border: 1px dashed rgba(127, 109, 78, 0.26);
      color: rgba(86, 71, 52, 0.9);
      font-size: 3.4rem;
      font-weight: 900;
      letter-spacing: -0.06em;
    }

    .evolution-card.is-next .evolution-lock {
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 210, 94, 0.22), transparent 28%),
        linear-gradient(180deg, rgba(245, 231, 203, 0.92), rgba(235, 222, 198, 0.86));
      color: #7f5b22;
      box-shadow: 0 12px 22px rgba(255, 185, 65, 0.12);
    }

    .evolution-card h4 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }

    .evolution-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .element-unlock-row {
      margin-top: 2px;
      display: grid;
      gap: 8px;
      align-content: start;
      justify-items: center;
      padding-top: 8px;
      border-top: 1px dashed rgba(150, 122, 82, 0.2);
    }

    .element-unlock-title {
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8f6a2c;
    }

    .element-badge {
      min-width: 76px;
      border-radius: 999px;
      padding: 7px 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.96);
      color: #354a72;
      font-size: 0.78rem;
      font-weight: 900;
      box-shadow: 0 10px 16px rgba(45, 31, 15, 0.06);
    }

    .element-badge-icon {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe687, #ff7c37);
      box-shadow: 0 0 10px rgba(255, 131, 51, 0.28);
      flex: 0 0 auto;
    }

    .element-badge[data-element="water"] .element-badge-icon {
      background: linear-gradient(180deg, #e8fbff, #4eb8ff);
      box-shadow: 0 0 10px rgba(98, 197, 255, 0.28);
    }

    .element-badge[data-element="wood"] .element-badge-icon {
      background: linear-gradient(180deg, #f1ffd4, #4dab63);
      box-shadow: 0 0 10px rgba(90, 183, 101, 0.24);
    }

    .element-badge[data-element="earth"] .element-badge-icon {
      background: linear-gradient(180deg, #f7e4bc, #9d6330);
      box-shadow: 0 0 10px rgba(164, 108, 53, 0.24);
    }

    .element-badge[data-element="metal"] .element-badge-icon {
      background: linear-gradient(180deg, #fff3ba, #7ba6ff);
      box-shadow: 0 0 10px rgba(110, 160, 255, 0.28);
    }

    .element-badge.is-active {
      color: #1f3663;
      box-shadow:
        0 12px 18px rgba(45, 31, 15, 0.1),
        0 0 0 2px rgba(255, 214, 114, 0.24);
    }

    .element-badge.is-locked {
      opacity: 0.58;
      filter: saturate(0.4);
    }

    .evolution-modal-summary {
      margin-top: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(240px, 0.8fr);
      gap: 14px;
      align-items: stretch;
    }

    .evolution-summary-card,
    .evolution-goal-card {
      border-radius: 22px;
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(255, 255, 255, 0.88);
      box-shadow: 0 12px 22px rgba(45, 31, 15, 0.07);
    }

    .evolution-summary-card strong,
    .evolution-goal-card strong {
      display: block;
      margin-top: 6px;
      font-size: 1.26rem;
      letter-spacing: -0.03em;
    }

    .evolution-summary-card p,
    .evolution-goal-card p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .mini-badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.9);
      font-size: 0.84rem;
      font-weight: 900;
      color: var(--ink);
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      padding: 0 12px;
      display: none;
    }

    @media (max-width: 1100px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .top-stats {
        justify-content: flex-start;
      }

      .main-grid {
        grid-template-columns: 1fr;
      }

      .pet-stage {
        grid-template-columns: 1fr;
      }

      .pet-evolution-shell {
        position: static;
        width: 100%;
        display: grid;
        justify-items: start;
      }

      .element-switcher {
        position: static;
        width: 100%;
        margin-bottom: 8px;
      }

      .pet-feed-shortcut {
        position: static;
        width: auto;
        justify-self: end;
      }

      .pet-evolution-card {
        position: static;
        right: auto;
        left: auto;
        bottom: auto;
        margin-top: 10px;
        width: min(100%, 320px);
      }

      .pet-wrap {
        gap: 12px;
      }

      .element-orbit {
        position: static;
        right: auto;
        top: auto;
        width: min(100%, 320px);
        height: auto;
        max-height: 0;
        margin-top: 0;
        overflow: hidden;
        display: grid;
        gap: 8px;
        justify-items: stretch;
      }

      .element-switcher.is-open .element-orbit,
      .element-switcher:focus-within .element-orbit {
        max-height: 320px;
        margin-top: 10px;
      }

      .element-chip,
      .element-core-button {
        width: 100%;
      }

      .element-chip {
        position: static;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-align: left;
      }

      .evolution-rail {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .evolution-rail::before {
        display: none;
      }

      .evolution-modal-summary {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        width: min(100vw - 20px, 100%);
        margin-top: 10px;
      }

      .panel {
        border-radius: 22px;
      }

      .topbar {
        padding: 14px;
      }

      .day-strip {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stage,
      .quest-panel,
      .reward-panel,
      .growth-panel {
        padding: 16px;
      }

      .task-foot {
        flex-direction: column;
        align-items: stretch;
      }

      .bottom-growth-panel {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      .bottom-growth-side {
        justify-items: start;
      }

      .pet-feedback {
        right: 10px;
        top: 72px;
        min-width: 92px;
        padding: 8px 12px;
      }

      .element-switcher {
        min-height: 0;
      }

      .pet-feed-shortcut {
        width: auto;
      }

      .evolution-modal-panel {
        padding: 18px 16px 16px;
      }

      .evolution-modal-top {
        align-items: start;
      }

      .evolution-rail {
        grid-template-columns: 1fr;
      }

      .task-button,
      .feed-button {
        width: 100%;
      }

      .feed-button.pet-feed-shortcut {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="panel topbar">
      <div class="profile">
        <div class="avatar">LK</div>
        <div class="profile-label">
          <div class="overline">Adventure Base</div>
          <h1 class="hero-name">乐乐的训练营</h1>
          <p class="subtle is-helper-copy" id="profileSubtitle">今天继续带着烈焰幼龙完成委托。</p>
        </div>
      </div>

      <div class="day-strip" id="dayStrip" aria-label="本周作战日历"></div>

      <div class="top-stats">
        <div class="stat-pill">
          <span class="overline">今日星星</span>
          <strong class="stat-value" id="starsValue">0</strong>
        </div>
        <div class="stat-pill">
          <span class="overline">连续完成</span>
          <strong class="stat-value" id="streakValue">4天</strong>
        </div>
        <div class="stat-pill">
          <span class="overline">今日进度</span>
          <strong class="stat-value" id="progressValue">0/0</strong>
        </div>
      </div>
    </section>

    <section class="main-grid">
      <section class="panel stage">
        <div class="stage-top">
          <div class="badge-stack">
            <div class="season-chip" id="selectedDayLabel">周一作战日</div>
          </div>
        </div>

        <div class="pet-stage">
          <div class="pet-wrap" data-element="fire">
            <div class="pet-stage-tag" id="petMoodTag">待命</div>
            <div class="pet-aura"></div>
            <div class="pet-disc"></div>
            <div class="pet-energy-ring" aria-hidden="true"></div>
            <div class="pet-core" id="petCore" data-stage="2" data-mode="idle" data-element="fire" aria-label="可进化龙伙伴">
              <div class="pet-spark pet-spark-one"></div>
              <div class="pet-spark pet-spark-two"></div>
              <div class="pet-spark pet-spark-three"></div>
              <div class="pet-tail">
                <div class="pet-tail-base"></div>
                <div class="pet-tail-flame"></div>
              </div>
              <div class="pet-wing pet-wing-left"></div>
              <div class="pet-wing pet-wing-right"></div>
              <div class="pet-body">
                <div class="pet-belly"></div>
                <div class="pet-armor"></div>
                <div class="pet-paw pet-paw-left"></div>
                <div class="pet-paw pet-paw-right"></div>
                <div class="pet-head">
                  <div class="pet-horn pet-horn-left"></div>
                  <div class="pet-horn pet-horn-right"></div>
                  <div class="pet-crown"><span></span></div>
                  <div class="pet-cheek pet-cheek-left"></div>
                  <div class="pet-cheek pet-cheek-right"></div>
                  <div class="pet-eye pet-eye-left"></div>
                  <div class="pet-eye pet-eye-right"></div>
                  <div class="pet-snout"></div>
                  <div class="pet-mouth"></div>
                </div>

      return petStages.find((stage) => stage.level === level) ?? petStages[0];

      return petStages.find((stage) => stage.level === level + 1) ?? null;
    }

      return elementMeta[elementKey] ?? elementMeta.fire;

    function getUnlockedElements(level = state.level) {
      return elementOrder.filter((elementKey) => elementMeta[elementKey].unlockStage <= level);
    }

      state.unlockedElements = getUnlockedElements();
      if (!state.unlockedElements.includes(state.activeElement)) {
        state.activeElement = state.unlockedElements[0];
      }
    }

    function canEvolve() {
      const currentStage = getStageMeta();
      return (
        currentStage.nextGrowth !== null &&
        state.growth >= currentStage.nextGrowth &&
        state.crystals >= currentStage.nextCrystals
      );
    }

    function renderCrystalRow(requiredCrystals) {
      crystalRow.innerHTML = "";
      const slots = requiredCrystals ?? 4;
      const litCount = requiredCrystals === null ? 4 : Math.min(state.crystals, requiredCrystals);

      for (let index = 0; index < slots; index += 1) {
        const crystal = document.createElement("span");
        crystal.className = "crystal-dot";
        if (index < litCount) {
          crystal.classList.add("is-lit");
        }
        crystalRow.appendChild(crystal);

      if (/[\u4E66\u7B7E\u7FBD\u53F7]/.test(rewardName)) return "\u2726";
      if (/[\u7CD6\u997C\u70B9\u5FC3\u9EA6\u996D\u56E2]/.test(rewardName)) return "\uD83C\uDF6A";
      if (/\u6273\u624B/.test(rewardName)) return "\u2692\uFE0F";
      if (/[\u679C\u8393\u6843\u51BB]/.test(rewardName)) return "\uD83C\uDF4E";
      return "\uD83C\uDF56";
    }

      petFeedback.dataset.tone = tone;
      petFeedback.classList.remove("is-visible");
      void petFeedback.offsetWidth;
      petFeedback.classList.add("is-visible");
      petFeedbackTimer = window.setTimeout(() => {
        petFeedback.classList.remove("is-visible");

    function launchFeedProjectile(rewardName) {
      const source = rewardIcons.querySelector(".reward-drop:not(.is-empty)") ?? rewardBanner;
      if (!source) return;

      const sourceRect = source.getBoundingClientRect();
      const targetRect = petCore.getBoundingClientRect();
      const flyingDrop = document.createElement("div");
      flyingDrop.className = "flying-drop";
      flyingDrop.textContent = getRewardGlyph(rewardName);
      flyingDrop.style.left = `${sourceRect.left + sourceRect.width / 2}px`;
      flyingDrop.style.top = `${sourceRect.top + sourceRect.height / 2}px`;
      flyingDrop.style.setProperty("--fly-x", `${targetRect.left + targetRect.width * 0.56 - (sourceRect.left + sourceRect.width / 2)}px`);
      flyingDrop.style.setProperty("--fly-y", `${targetRect.top + targetRect.height * 0.34 - (sourceRect.top + sourceRect.height / 2)}px`);
      document.body.appendChild(flyingDrop);
      rewardBanner.classList.add("is-feeding");

      requestAnimationFrame(() => {
        flyingDrop.classList.add("is-flying");
      });

      window.setTimeout(() => {
        rewardBanner.classList.remove("is-feeding");
        flyingDrop.remove();
      }, 780);
    }

      rewardBanner.classList.toggle("is-empty", state.rewardQueue.length === 0);
      rewardIcons.classList.toggle("is-empty", state.rewardQueue.length === 0);
      rewardOverflow.hidden = overflow === 0;
      rewardOverflow.textContent = `+${overflow}`;

      if (visibleRewards.length === 0) {
        const emptyDrop = document.createElement("span");
        emptyDrop.className = "reward-drop is-empty";
        emptyDrop.textContent = "\u5F85\u8865\u7ED9";
        rewardIcons.appendChild(emptyDrop);
        return;

      visibleRewards.forEach((rewardName) => {
        const rewardDrop = document.createElement("span");
        rewardDrop.className = "reward-drop";

        const icon = document.createElement("span");
        icon.className = "reward-drop-icon";
        icon.textContent = getRewardGlyph(rewardName);

        copy.className = "reward-drop-copy";
        const overline = document.createElement("small");
        overline.textContent = "supply";
        const label = document.createElement("span");
        label.textContent = rewardName;

        copy.append(overline, label);
        rewardDrop.append(icon, copy);
        rewardIcons.appendChild(rewardDrop);
      });
    }

      }
      if (isActive) {
        badge.classList.add("is-active");
      }

      const icon = document.createElement("span");
      icon.className = "element-badge-icon";
      const label = document.createElement("span");
      label.textContent = isUnlocked ? meta.name : "???";

      badge.append(icon, label);
      return badge;
    }

    function renderElementSwitcher() {
      syncUnlockedElements();
      const activeMeta = getElementMeta();
      elementCoreLabel.textContent = activeMeta.coreLabel;
      elementCoreButton.dataset.element = state.activeElement;
      elementCoreButton.setAttribute("aria-label", `切换属性，当前${activeMeta.name}`);

      elementOrbit.querySelectorAll(".element-chip").forEach((chip) => {
        const elementKey = chip.dataset.element;
        const meta = elementMeta[elementKey];
        const unlocked = state.unlockedElements.includes(elementKey);
        const active = state.activeElement === elementKey;
        const label = chip.querySelector(".element-chip-label");
        const note = chip.querySelector(".element-lock-note");

        chip.dataset.state = active ? "active" : unlocked ? "unlocked" : "locked";
        chip.classList.toggle("is-active", active);
        chip.classList.toggle("is-locked", !unlocked);
        chip.setAttribute("aria-pressed", String(active));
        chip.setAttribute("aria-disabled", String(!unlocked));

        if (label) {
          label.textContent = unlocked ? meta.name : "???";
        }

        if (note) {
          note.textContent = active ? "激活" : unlocked ? "可切" : `${meta.unlockStage}阶`;
        }
      });
    }

    function activateElement(elementKey) {
      const meta = elementMeta[elementKey];
      if (!meta) return;

      if (!state.unlockedElements.includes(elementKey)) {
        showPetFeedback(`${meta.unlockStage}阶解锁`, "warn");
        setElementSwitcherOpen(false);
        return;
      }

      const changed = state.activeElement !== elementKey;
      state.activeElement = elementKey;
      setElementSwitcherOpen(false);
      renderStage(false);

      if (changed) {
        triggerElementShift();
        showPetFeedback(meta.activeCue, "element");
      }
    }

    function renderEvolutionGallery() {
      evolutionRail.innerHTML = "";

      const currentStage = getStageMeta();
      const nextStage = getNextStageMeta();

      petStages.forEach((stage) => {
        const card = document.createElement("article");
        card.className = "evolution-card";
        const stateTag = document.createElement("div");
        stateTag.className = "evolution-state";
        const title = document.createElement("h4");
        const copy = document.createElement("p");

        if (stage.level < state.level) {
          card.classList.add("is-unlocked");
          stateTag.textContent = "已解锁";
          title.textContent = stage.name;
          copy.textContent = stage.description;
          card.appendChild(stateTag);
          card.appendChild(createUnlockedEvolutionAvatar(stage.level));
        } else if (stage.level === state.level) {
          card.classList.add("is-current");
          stateTag.textContent = "当前阶段";
          title.textContent = stage.name;
          copy.textContent = "当前伙伴";
          card.appendChild(stateTag);
          card.appendChild(createUnlockedEvolutionAvatar(stage.level));
        } else if (nextStage && stage.level === nextStage.level) {
          card.classList.add("is-locked", "is-next");
          stateTag.textContent = "即将揭晓";
          title.textContent = "???";
          copy.textContent = "下一阶解锁";
          const lock = document.createElement("div");
          lock.className = "evolution-lock";
          lock.textContent = "?";
          card.appendChild(stateTag);
          card.appendChild(lock);
        } else {
          card.classList.add("is-locked");
          stateTag.textContent = "封印中";
          title.textContent = "???";
          copy.textContent = "神秘形态";
          const lock = document.createElement("div");
          lock.className = "evolution-lock";
          lock.textContent = "???";
          card.appendChild(stateTag);
          card.appendChild(lock);
        }

        const unlockRow = document.createElement("div");
        unlockRow.className = "element-unlock-row";
        const unlockTitle = document.createElement("div");
        unlockTitle.className = "element-unlock-title";
        unlockTitle.textContent = "本阶新增";
        unlockRow.appendChild(unlockTitle);
        unlockRow.appendChild(
          createElementBadge(
            stage.unlockElement,
            stage.level <= state.level,
            state.activeElement === stage.unlockElement && stage.level <= state.level
          )
        );

        card.appendChild(title);
        card.appendChild(copy);
        card.appendChild(unlockRow);
        evolutionRail.appendChild(card);
      });

      evolutionSummaryTitle.textContent = `当前：${currentStage.name}`;
      evolutionSummaryCopy.textContent = `已解锁 ${state.level} 阶 / ${state.unlockedElements.length} 元素`;

      if (!nextStage) {
        evolutionGoalTitle.textContent = "已满级";
        evolutionGoalCopy.textContent = `当前属性：${getElementMeta().name}`;
      } else {
        const growthLeft = Math.max(currentStage.nextGrowth - state.growth, 0);
        const crystalLeft = Math.max(currentStage.nextCrystals - state.crystals, 0);
        evolutionGoalTitle.textContent = `下一阶：${nextStage.name}`;
        evolutionGoalCopy.textContent = `差 ${growthLeft} 成长 / ${crystalLeft} 晶核 · 解锁${elementMeta[nextStage.unlockElement].name}`;
      }
    }

    function getDayStatusMeta(day, index) {
      if (day.restDay) return { label: "休息", tone: "rest" };
      const doneCount = day.tasks.filter((task) => task.done).length;
      if (index === todayIndex) {
        if (doneCount === day.tasks.length && day.tasks.length > 0) {
          return { label: "已完成", tone: "complete" };
        }
        return doneCount > 0
          ? { label: "进行中", tone: "active" }
          : { label: "待开始", tone: "pending" };
      }
      if (doneCount === 0) {
        return index < todayIndex
          ? { label: "未开", tone: "locked" }
          : { label: "待战", tone: "future" };
      }
      if (doneCount === day.tasks.length) return { label: "已攻克", tone: "complete" };
      return { label: "进行中", tone: "active" };
    }

    function getStars(doneCount, totalCount, isRestDay) {
      if (isRestDay || totalCount === 0) return 0;
      return Math.ceil((doneCount / totalCount) * 5);
    }

    function renderDayStrip() {
      dayStrip.innerHTML = "";

      weekData.forEach((day, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "day-chip";

        if (index === state.selectedIndex) {
          button.classList.add("is-selected");
        }

        if (index === todayIndex) {
          button.classList.add("is-today");
        }

        const status = getDayStatusMeta(day, index);
        button.dataset.status = status.tone;
        button.innerHTML = `
          <div class="day-top-slot">${index === todayIndex ? '<span class="day-today-tag">TODAY</span>' : ""}</div>
          <div class="day-name">周${day.label}</div>
          <div class="day-date">${day.date}</div>
          <div class="day-state is-${status.tone}">${status.label}</div>
        `;

        button.addEventListener("click", () => {
          state.selectedIndex = index;
          render();
        });

        dayStrip.appendChild(button);
      });
    }

    function renderTasks(selectedDay) {
      taskList.innerHTML = "";

      if (selectedDay.restDay) {
        const restCard = document.createElement("article");
        restCard.className = "task-card is-done";
        restCard.innerHTML = `
          <div class="task-meta">
            <span class="subject-badge reading">修整日</span>
            <span class="task-time">无固定时长</span>
          </div>
          <h4 class="task-title">今天自由修整</h4>
          <p class="task-copy">伙伴会在营地巡逻、晒太阳、补充体力。你也可以自由阅读或放松一下。</p>
          <div class="task-foot">
            <span class="task-reward">休息不断连</span>
            <button class="task-button" type="button" disabled>修整日</button>
          </div>
        `;
        taskList.appendChild(restCard);
        return;
      }

      selectedDay.tasks.forEach((task) => {
        const card = document.createElement("article");
        card.className = "task-card";
        if (task.done) {
          card.classList.add("is-done");
        }

        const buttonLabel = task.done ? "已攻克" : "去完成";
        const buttonDisabled = task.done ? "disabled" : "";

        card.innerHTML = `
          <div class="task-meta">
            <span class="subject-badge ${task.subject}">${task.subjectLabel}</span>
            <span class="task-time">${task.time}</span>
          </div>
          <h4 class="task-title">${task.title}</h4>
          <p class="task-copy">${task.copy}</p>
          <div class="task-foot">
            <span class="task-reward">奖励 ${task.reward}</span>
            <button class="task-button" type="button" data-task-id="${task.id}" ${buttonDisabled}>${buttonLabel}</button>
          </div>
        `;

        const button = card.querySelector(".task-button");
        button.addEventListener("click", () => {
          completeTask(selectedDay.key, task.id, task.reward);
        });

        taskList.appendChild(card);
      });
    }

    function completeTask(dayKey, taskId, rewardName) {
      const day = weekData.find((entry) => entry.key === dayKey);
      const task = day.tasks.find((entry) => entry.id === taskId);

      if (!task || task.done) {
        return;
      }

      task.done = true;
      state.rewardQueue.push(rewardName);
      state.lastFeed = "";
      const summaryParts = [`${rewardName} +1`];

      if (day.tasks.every((entry) => entry.done) && !day.crystalAwarded) {
        day.crystalAwarded = true;
        state.crystals += 1;
        summaryParts.push("\u6676\u6838+1");
        showPetFeedback("\u6676\u6838+1", "crystal");

        if (canEvolve()) {
          state.lastFeed = "\u5DF2\u6EE1\u8DB3\u8FDB\u5316";
          scheduleEvolutionCue();
        }
      }

      state.lastReward = summaryParts.join(" / ");
      render();
    }

    function feedPet() {
      if (state.rewardQueue.length === 0) {
        state.lastFeed = "\u53BB\u62FF\u8865\u7ED9";
        render();
        return;
      }

      const rewardName = state.rewardQueue.shift();
      state.lastReward = "";
      state.growth = Math.min(100, state.growth + 12);
      state.lastFeed = "\u6210\u957F+12";
      launchFeedProjectile(rewardName);
      pulseGrowthRail();
      showPetFeedback("\u6210\u957F+12", "growth");

      if (canEvolve()) {
        state.lastFeed = "\u5DF2\u6EE1\u8DB3\u8FDB\u5316";
        scheduleEvolutionCue();
      }

      render(true);
    }

    function evolvePet() {
      if (!canEvolve()) {
        state.lastFeed = "\u8FD8\u5DEE\u4E00\u70B9";
        render();
        return;
      }

      const currentStage = getStageMeta();
      const nextStage = getNextStageMeta();
      const previousUnlockCount = state.unlockedElements.length;

      state.crystals -= currentStage.nextCrystals;
      state.growth = 18;
      state.level += 1;
      syncUnlockedElements();
      state.lastReward = "";
      state.lastFeed = `${currentStage.name} -> ${nextStage.name}`;
      pulseGrowthRail();
      showPetFeedback("\u8FDB\u5316\uFF01", "evolve");

      if (state.unlockedElements.length > previousUnlockCount) {
        const unlockedMeta = elementMeta[nextStage.unlockElement];
        state.lastFeed = `${currentStage.name} -> ${nextStage.name} / 解锁${unlockedMeta.name}`;
        window.setTimeout(() => {
          showPetFeedback(`${unlockedMeta.name}解锁`, "element");
        }, 520);
      }

      petCore.classList.add("is-evolving");
      window.setTimeout(() => {
        petCore.classList.remove("is-evolving");
      }, 1400);

      render(true);
    }

    function getSelectedDay() {
      return weekData[state.selectedIndex];
    }

    function renderStage(animateHappy) {
      syncUnlockedElements();
      const selectedDay = getSelectedDay();
      const doneCount = selectedDay.tasks.filter((task) => task.done).length;
      const totalCount = selectedDay.tasks.length;
      const isRestDay = selectedDay.restDay;
      const stars = getStars(doneCount, totalCount, isRestDay);
      const queueCount = state.rewardQueue.length;
      const hasQueue = queueCount > 0;
      const currentStage = getStageMeta();
      const nextStage = getNextStageMeta();
      const evolutionReady = canEvolve();
      const currentStageName = currentStage.name;
      let petMode = "idle";

      selectedDayLabel.textContent = `${selectedDay.fullLabel} / ${selectedDay.date}`;
      progressValue.textContent = isRestDay ? "\u4F11\u606F\u65E5" : `${doneCount}/${totalCount}`;
      starsValue.textContent = `${stars}`;
      streakValue.textContent = `${state.streak}\u5929`;
      badgeLevel.textContent = `${state.level}`;
      badgeCrystal.textContent = currentStage.nextCrystals === null ? "MAX" : `${state.crystals}`;
      growthFill.style.width = `${state.growth}%`;
      growthPercent.textContent = `${state.growth}%`;
      growthPoints.textContent = `\u6210\u957F\u503C ${state.growth} / 100`;
      petWrap.dataset.element = state.activeElement;
      petCore.dataset.stage = String(state.level);
      petCore.dataset.element = state.activeElement;
      petStageName.textContent = currentStageName;

      if (currentStage.level === 5) {
        petEvolutionHint.textContent = "\u6700\u7EC8\u5F62\u6001";
        petEvolutionTrigger.textContent = "\u5DF2\u6EE1\u7EA7";
        growthHint.textContent = "\u5DF2\u6EE1\u7EA7";
        renderCrystalRow(null);
        evolveButton.hidden = true;
      } else if (evolutionReady) {
        petEvolutionHint.textContent = `\u70B9\u6B64\u8FDB\u5316\u4E3A ${nextStage.name}`;
        petEvolutionTrigger.textContent = "\u53EF\u8FDB\u5316";
        growthHint.textContent = "\u70B9\u51FB\u8FDB\u5316";
        renderCrystalRow(currentStage.nextCrystals);
        evolveButton.hidden = false;
        evolveButton.textContent = `\u8FDB\u5316\u6210 ${nextStage.name}`;
      } else {
        const growthLeft = Math.max(currentStage.nextGrowth - state.growth, 0);
        const crystalLeft = Math.max(currentStage.nextCrystals - state.crystals, 0);
        petEvolutionHint.textContent = `\u5DEE ${growthLeft} \u6210\u957F / ${crystalLeft} \u6676\u6838`;
        petEvolutionTrigger.textContent = "\u8FDB\u5316";
        growthHint.textContent = "\u6BCF\u6B21\u6295\u5582 +12";
        renderCrystalRow(currentStage.nextCrystals);
        evolveButton.hidden = true;
      }

      renderEvolutionGallery();
      renderElementSwitcher();
      petCore.classList.toggle("is-happy", Boolean(animateHappy || hasQueue));

      if (isRestDay) {
        petMode = "rest";
        petMoodTag.textContent = "\u4FEE\u6574";
      } else if (evolutionReady) {
        petMode = "evolve";
        petMoodTag.textContent = "\u53EF\u8FDB\u5316";
      } else if (doneCount === 0) {
        petMode = "idle";
        petMoodTag.textContent = "\u5F85\u547D";
      } else if (doneCount < totalCount) {
        petMode = hasQueue ? "hungry" : "ready";
        petMoodTag.textContent = hasQueue ? "\u5F85\u5582" : "\u8FDB\u884C\u4E2D";
      } else {
        petMode = "complete";
        petMoodTag.textContent = hasQueue ? "\u5F85\u5582" : "\u6EE1\u72B6\u6001";
      }

      petWrap.dataset.mode = petMode;
      petCore.dataset.mode = petMode;
      renderRewardQueue();

      if (state.lastFeed) {
        rewardCopy.textContent = state.lastFeed;
      } else if (state.lastReward) {
        rewardCopy.textContent = state.lastReward;
      } else if (hasQueue) {
        rewardCopy.textContent = `\u5F85\u6295\u5582 ${queueCount} \u4EFD`;
      } else {
        rewardCopy.textContent = "\u53BB\u62FF\u8865\u7ED9";
      }

      feedButton.textContent = queueCount > 1 ? `\u5582\u7ED9\u4F19\u4F34 x${queueCount}` : "\u5582\u7ED9\u4F19\u4F34";
      feedButton.disabled = queueCount === 0;
      petFeedShortcut.textContent = queueCount === 0 ? "\u5F85\u8865\u7ED9" : queueCount > 1 ? `\u5582\u98DFx${queueCount}` : "\u5582\u98DF";
      petFeedShortcut.disabled = queueCount === 0;
      petFeedShortcut.classList.toggle("is-empty", queueCount === 0);
    }

    function render(animateHappy = false) {
      renderDayStrip();
      renderTasks(getSelectedDay());
      renderStage(animateHappy);
    }

    feedButton.addEventListener("click", feedPet);
    petFeedShortcut.addEventListener("click", (event) => {
      event.stopPropagation();
      setEvolutionOpen(false);
      feedPet();
    });
    evolveButton.addEventListener("click", evolvePet);
    elementCoreButton.addEventListener("click", (event) => {
      event.stopPropagation();
      const nextOpen = !elementSwitcher.classList.contains("is-open");
      setElementSwitcherOpen(nextOpen);
    });
    elementOrbit.querySelectorAll(".element-chip").forEach((chip) => {
      chip.addEventListener("click", (event) => {
        event.stopPropagation();
        activateElement(chip.dataset.element);
      });
    });
    openEvolutionGalleryButton.addEventListener("click", (event) => {
      event.stopPropagation();
      setElementSwitcherOpen(false);
      setEvolutionOpen(false);
      setEvolutionModalOpen(true);
    });
    closeEvolutionModalButton.addEventListener("click", () => {
      setEvolutionModalOpen(false);
    });
    petEvolutionTrigger.addEventListener("click", (event) => {
      event.stopPropagation();
      const nextOpen = !petEvolutionShell.classList.contains("is-open");
      setEvolutionOpen(nextOpen);
    });
    petEvolutionShell.addEventListener("mouseleave", () => {
      setEvolutionOpen(false);
    });
    elementSwitcher.addEventListener("mouseleave", () => {
      setElementSwitcherOpen(false);
    });
    document.addEventListener("click", (event) => {
      if (!elementSwitcher.contains(event.target)) {
        setElementSwitcherOpen(false);
      }
      if (!petEvolutionShell.contains(event.target)) {
        setEvolutionOpen(false);
      }
      if (event.target === evolutionModal) {
        setEvolutionModalOpen(false);
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        setElementSwitcherOpen(false);
        setEvolutionOpen(false);
        setEvolutionModalOpen(false);
      }
    });
    render();
  </script>
</body>
</html>
