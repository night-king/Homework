<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>孩子端首页原型</title>
  <style>
    :root {
      --bg-top: #fff5d7;
      --bg-bottom: #f4f8ff;
      --paper: rgba(255, 251, 241, 0.88);
      --paper-strong: rgba(255, 248, 230, 0.96);
      --line: rgba(78, 53, 28, 0.12);
      --ink: #2c221d;
      --muted: #6f6256;
      --brand: #ff7a37;
      --brand-deep: #de5416;
      --gold: #ffc54d;
      --sky: #3da6ff;
      --teal: #1fbead;
      --mint: #dcfff4;
      --success: #2eb769;
      --danger: #ff825b;
      --shadow-lg: 0 28px 60px rgba(163, 93, 13, 0.16);
      --shadow-md: 0 16px 30px rgba(77, 58, 24, 0.12);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --content-width: 1280px;
      font-family: "Segoe UI Variable Display", "Trebuchet MS", "Microsoft YaHei UI", sans-serif;
      color: var(--ink);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 208, 114, 0.75), transparent 22%),
        radial-gradient(circle at 85% 12%, rgba(61, 166, 255, 0.3), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255, 122, 55, 0.14), transparent 24%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.4), transparent 82%);
    }

    .app-shell {
      width: min(var(--content-width), calc(100vw - 32px));
      margin: 24px auto 40px;
      display: grid;
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--paper);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow-md);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(200px, 260px) 1fr minmax(220px, 320px);
      gap: 18px;
      padding: 16px 18px;
      align-items: center;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      color: #fff;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.46), transparent 28%),
        linear-gradient(145deg, #ff954f, #f75d25);
      box-shadow: 0 16px 26px rgba(247, 93, 37, 0.28);
      font-size: 1.8rem;
      font-weight: 900;
    }

    .profile-label {
      display: grid;
      gap: 3px;
    }

    .overline {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero-name {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1;
      font-weight: 900;
    }

    .subtle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .is-helper-copy {
      display: none;
    }

    .top-stats {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat-pill {
      min-width: 92px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
      display: grid;
      gap: 2px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 900;
    }

    .day-strip {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .day-chip {
      border: 1px solid rgba(85, 58, 24, 0.12);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--ink);
      padding: 12px 8px 12px;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 4px;
      text-align: center;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      position: relative;
      overflow: hidden;
    }

    .day-chip:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(36, 28, 18, 0.08);
    }

    .day-chip.is-selected {
      border-color: rgba(255, 122, 55, 0.42);
      background:
        linear-gradient(180deg, rgba(255, 248, 228, 0.96), rgba(255, 233, 190, 0.9));
      box-shadow: 0 18px 30px rgba(255, 122, 55, 0.22);
      transform: translateY(-2px);
    }

    .day-top-slot {
      width: 100%;
      min-height: 4px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: relative;
      overflow: visible;
      margin-bottom: 2px;
    }

    .day-today-tag {
      position: absolute;
      left: 50%;
      top: -10px;
      transform: translateX(-50%);
      min-width: 38px;
      padding: 3px 6px 3px;
      border-radius: 0 0 8px 8px;
      background: linear-gradient(180deg, rgba(255, 245, 210, 0.98), rgba(255, 229, 170, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        0 6px 10px rgba(215, 153, 49, 0.12);
      font-size: 0.42rem;
      font-weight: 900;
      color: #9a5f10;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .day-name {
      font-size: 1rem;
      font-weight: 900;
    }

    .day-date {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .day-state {
      margin-top: 4px;
      min-width: 54px;
      padding: 6px 9px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.74rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.02em;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .day-state.is-pending {
      background: rgba(255, 236, 193, 0.95);
      color: #9a6717;
    }

    .day-state.is-active {
      background: rgba(206, 245, 242, 0.98);
      color: #0f6f73;
    }

    .day-state.is-complete {
      background: rgba(255, 225, 186, 0.96);
      color: #ae5517;
    }

    .day-state.is-future {
      background: rgba(225, 233, 244, 0.96);
      color: #52698c;
    }

    .day-state.is-locked {
      background: rgba(236, 232, 224, 0.94);
      color: #7c705f;
    }

    .day-state.is-rest {
      background: rgba(220, 241, 228, 0.96);
      color: #477463;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(340px, 420px);
      gap: 18px;
      align-items: stretch;
    }

    .stage {
      padding: 22px;
      position: relative;
      overflow: hidden;
      min-height: 530px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 196, 82, 0.34), transparent 26%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.2));
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.46);
      pointer-events: none;
    }

    .stage-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .badge-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .season-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 14px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.85);
      color: var(--ink);
      font-weight: 900;
      font-size: 0.92rem;
      box-shadow: 0 10px 20px rgba(36, 28, 18, 0.07);
    }

    .pet-stage {
      margin-top: 6px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .pet-wrap {
      --element-main: #ffb85e;
      --element-mid: #ff7c37;
      --element-deep: #d94c18;
      --element-soft: #fff0cb;
      --element-accent: #ffd35d;
      --element-glow: rgba(255, 196, 82, 0.54);
      --element-glow-soft: rgba(255, 196, 82, 0.08);
      --element-ring: rgba(255, 226, 164, 0.34);
      --element-ring-shadow: rgba(255, 193, 84, 0.08);
      --element-ring-bloom: rgba(255, 169, 54, 0.12);
      --element-disc: rgba(73, 45, 18, 0.24);
      --spark-light: rgba(255, 250, 199, 0.95);
      --spark-deep: rgba(255, 193, 56, 0.85);
      --spark-shadow: rgba(255, 196, 82, 0.4);
      --wing-light: rgba(255, 236, 195, 0.9);
      --wing-mid: rgba(255, 176, 71, 0.96);
      --wing-deep: rgba(231, 90, 29, 0.98);
      --armor-light: rgba(255, 240, 205, 0.96);
      --armor-mid: rgba(255, 197, 77, 0.92);
      --armor-deep: rgba(248, 103, 47, 0.94);
      --element-ring-style: solid;
      --element-ring-width: 2px;
      position: relative;
      display: grid;
      justify-items: center;
      align-content: end;
      min-height: 410px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
      padding: 18px 0 10px;
    }

    .pet-aura {
      position: absolute;
      width: 92%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, var(--element-glow), var(--element-glow-soft) 58%, transparent 72%);
      filter: blur(10px);
      opacity: 0.9;
      animation: aura-pulse 4.6s ease-in-out infinite;
    }

    .pet-disc {
      position: absolute;
      bottom: 22px;
      width: 76%;
      height: 42px;
      border-radius: 999px;
      background: radial-gradient(circle, var(--element-disc), transparent 72%);
      filter: blur(8px);
    }

    .pet-energy-ring {
      position: absolute;
      inset: 88px 50px 44px;
      border-radius: 50%;
      border: var(--element-ring-width) var(--element-ring-style) var(--element-ring);
      box-shadow:
        0 0 0 10px var(--element-ring-shadow),
        0 0 28px var(--element-ring-bloom);
      opacity: 0.28;
      transform: scale(0.94);
      animation: ring-spin 10s linear infinite;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .pet-stage-tag {
      position: absolute;
      left: 0;
      top: 10px;
      border-radius: 999px;
      padding: 9px 16px;
      background: rgba(37, 27, 18, 0.8);
      color: #fff3db;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.8rem;
      box-shadow: 0 12px 22px rgba(37, 27, 18, 0.18);
    }

    .pet-feedback {
      position: absolute;
      right: 28px;
      top: 88px;
      min-width: 104px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(46, 31, 18, 0.84);
      color: #fff5e2;
      font-size: 0.84rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-align: center;
      box-shadow: 0 16px 30px rgba(46, 31, 18, 0.16);
      opacity: 0;
      transform: translateY(10px) scale(0.92);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      z-index: 3;
    }

    .pet-feedback.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: feedback-float 1.4s ease-out;
    }

    .pet-feedback[data-tone="growth"] {
      background: linear-gradient(180deg, rgba(255, 134, 54, 0.96), rgba(222, 84, 22, 0.94));
    }

    .pet-feedback[data-tone="evolve"] {
      background: linear-gradient(180deg, rgba(72, 40, 159, 0.96), rgba(32, 112, 214, 0.94));
    }

    .pet-feedback[data-tone="warn"] {
      background: linear-gradient(180deg, rgba(53, 43, 35, 0.96), rgba(27, 20, 16, 0.94));
    }

    .pet-confetti {
      position: absolute;
      inset: 40px 74px 130px;
      pointer-events: none;
      z-index: 2;
    }

    .pet-confetti span {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 5px;
      opacity: 0;
      background: linear-gradient(180deg, rgba(255, 247, 196, 0.96), rgba(255, 190, 67, 0.92));
      box-shadow: 0 0 16px rgba(255, 193, 84, 0.24);
    }

    .pet-confetti span:nth-child(1) {
      left: 12%;
      bottom: 4%;
      animation-delay: -0.1s;
    }

    .pet-confetti span:nth-child(2) {
      left: 32%;
      bottom: 18%;
      background: linear-gradient(180deg, rgba(255, 178, 91, 0.96), rgba(255, 115, 44, 0.92));
      animation-delay: 0.12s;
    }

    .pet-confetti span:nth-child(3) {
      right: 34%;
      bottom: 10%;
      background: linear-gradient(180deg, rgba(132, 232, 255, 0.96), rgba(47, 182, 227, 0.92));
      animation-delay: 0.22s;
    }

    .pet-confetti span:nth-child(4) {
      right: 14%;
      bottom: 24%;
      animation-delay: 0.32s;
    }



    .pet-wrap[data-mode="rest"] .pet-core {
      animation-duration: 4.8s;
      filter: drop-shadow(0 18px 32px rgba(226, 90, 22, 0.16));
    }

    .pet-wrap[data-mode="rest"] .pet-aura {
      animation-duration: 6s;
      opacity: 0.72;
    }

    .pet-wrap[data-mode="rest"] .pet-energy-ring {
      opacity: 0.16;
      transform: scale(0.9);
    }

    .pet-wrap[data-mode="idle"] .pet-core {
      filter: drop-shadow(0 28px 42px rgba(226, 90, 22, 0.22));
    }

    .pet-wrap[data-mode="ready"] .pet-core {
      animation-duration: 2.7s;
      filter: drop-shadow(0 30px 48px rgba(226, 90, 22, 0.28));
    }

    .pet-wrap[data-mode="ready"] .pet-energy-ring {
      opacity: 0.42;
      transform: scale(0.99);
    }

    .pet-wrap[data-mode="hungry"] .pet-core {
      animation: pet-bob-hungry 1.9s ease-in-out infinite;
      filter: drop-shadow(0 34px 50px rgba(226, 90, 22, 0.32));
    }

    .pet-wrap[data-mode="hungry"] .pet-aura {
      opacity: 1;
      filter: blur(12px);
    }

    .pet-wrap[data-mode="hungry"] .pet-energy-ring {
      opacity: 0.62;
      transform: scale(1.02);
      box-shadow:
        0 0 0 12px color-mix(in srgb, var(--element-ring-shadow) 90%, transparent),
        0 0 36px color-mix(in srgb, var(--element-ring-bloom) 88%, transparent);
    }

    .pet-wrap[data-mode="evolve"] .pet-core {
      animation-duration: 2.2s;
      filter: drop-shadow(0 0 42px rgba(255, 213, 102, 0.5));
    }

    .pet-wrap[data-mode="evolve"] .pet-aura {
      opacity: 1;
      filter: blur(14px);
    }

    .pet-wrap[data-mode="evolve"] .pet-energy-ring {
      opacity: 1;
      transform: scale(1.08);
      box-shadow:
        0 0 0 14px color-mix(in srgb, var(--element-ring-shadow) 95%, transparent),
        0 0 42px color-mix(in srgb, var(--element-ring-bloom) 94%, white 6%);
      animation-duration: 2s;
    }

    .pet-wrap[data-mode="complete"] .pet-core {
      animation-duration: 2.8s;
      filter: drop-shadow(0 34px 52px rgba(226, 90, 22, 0.34));
    }

    .pet-wrap[data-mode="complete"] .pet-aura {
      opacity: 1;
    }

    .pet-wrap[data-mode="complete"] .pet-energy-ring {
      opacity: 0.56;
      transform: scale(1.03);
    }

    .pet-wrap[data-mode="complete"] .pet-confetti span {
      opacity: 0.92;
      animation: confetti-rise 1.9s ease-out infinite;
    }


    .pet-evolution-shell {
      position: absolute;
      left: 6px;
      bottom: 0;
      z-index: 2;
    }

    .pet-evolution-trigger {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: linear-gradient(180deg, rgba(41, 79, 155, 0.98), rgba(31, 58, 119, 0.96));
      color: #f7f5ff;
      font-weight: 900;
      letter-spacing: 0.02em;
      box-shadow: 0 14px 24px rgba(26, 45, 95, 0.24);
      cursor: pointer;
      transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
    }

    .pet-evolution-trigger:hover,
    .pet-evolution-trigger:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 18px 28px rgba(26, 45, 95, 0.28);
    }

    .pet-evolution-trigger:focus-visible {
      outline: 2px solid rgba(255, 217, 112, 0.9);
      outline-offset: 3px;
    }

    .pet-evolution-card {
      position: absolute;
      left: 0;
      bottom: calc(100% + 12px);
      width: 276px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 252, 243, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.96);
      box-shadow: 0 16px 30px rgba(41, 31, 17, 0.1);
      backdrop-filter: blur(12px);
      display: grid;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px) scale(0.98);
      transform-origin: bottom left;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .pet-evolution-card::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -12px;
      height: 12px;
    }

    .pet-evolution-shell:hover .pet-evolution-card,
    .pet-evolution-shell:focus-within .pet-evolution-card,
    .pet-evolution-shell.is-open .pet-evolution-card {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .pet-evolution-shell.is-evolving .pet-evolution-card {
      opacity: 0 !important;
      pointer-events: none !important;
      transform: translateY(10px) scale(0.98) !important;
    }

    .pet-evolution-card strong {
      display: block;
      margin-top: 4px;
      font-size: 1.24rem;
      letter-spacing: -0.03em;
    }

    .pet-evolution-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .pet-dex-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      align-items: start;
    }

    .pet-dex-node {
      display: grid;
      justify-items: center;
      gap: 4px;
    }

    .pet-dex-stage {
      font-size: 0.66rem;
      font-weight: 900;
      color: #927040;
      letter-spacing: 0.04em;
    }

    .evolution-avatar.is-mini,
    .evolution-lock.is-mini {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      margin: 0;
    }

    .evolution-avatar.is-mini {
      box-shadow:
        inset 0 6px 10px rgba(255, 255, 255, 0.2),
        0 10px 18px rgba(226, 90, 22, 0.12);
    }

    .evolution-avatar.is-mini::before,
    .evolution-avatar.is-mini::after {
      top: 7px;
      width: 10px;
      height: 16px;
    }

    .evolution-avatar.is-mini::before {
      left: 12px;
    }

    .evolution-avatar.is-mini::after {
      right: 12px;
    }

    .evolution-avatar.is-mini.stage-1::before,
    .evolution-avatar.is-mini.stage-1::after {
      transform: rotate(-26deg) scale(0.54);
      opacity: 0;
    }

    .evolution-avatar.is-mini .evolution-face {
      width: 34px;
      height: 32px;
      box-shadow: inset 0 4px 7px rgba(255, 255, 255, 0.18);
    }

    .evolution-avatar.is-mini .evolution-face::before,
    .evolution-avatar.is-mini .evolution-face::after {
      top: 10px;
      width: 7px;
      height: 9px;
    }

    .evolution-avatar.is-mini .evolution-face::before {
      left: 8px;
    }

    .evolution-avatar.is-mini .evolution-face::after {
      right: 8px;
    }

    .evolution-avatar.is-mini .evolution-face .evo-eye-core {
      top: 12px;
      left: 10px;
      width: 14px;
      height: 8px;
    }

    .evolution-avatar.is-mini .evolution-face .evo-eye-core::before,
    .evolution-avatar.is-mini .evolution-face .evo-eye-core::after {
      width: 4px;
      height: 6px;
    }

    .evolution-avatar.is-mini .evolution-neck,
    .evolution-avatar.is-mini .evolution-spines,
    .evolution-avatar.is-mini .evolution-wings,
    .evolution-avatar.is-mini .evolution-chest-core,
    .evolution-avatar.is-mini .evolution-crown,
    .evolution-avatar.is-mini .evolution-guard {
      transform-origin: center center;
    }

    .pet-dex-node .is-current {
      box-shadow:
        inset 0 6px 10px rgba(255, 255, 255, 0.2),
        0 10px 18px rgba(226, 90, 22, 0.12),
        0 0 0 2px rgba(255, 208, 114, 0.34);
    }

    .pet-dex-copy {
      margin: 0;
      color: #7b6752;
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .growth-gallery-link {
      border: 0;
      padding: 0;
      background: transparent;
      color: #7a531a;
      font-size: 0.84rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;

    @keyframes pet-bob {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes pet-bob-hungry {
      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }
      35% {
        transform: translateY(-12px) rotate(-1.2deg);
      }
      70% {
        transform: translateY(-4px) rotate(1.2deg);
      }
    }

    @keyframes aura-pulse {
      0%,
      100% {
        transform: scale(0.98);
        opacity: 0.82;
      }
      50% {
        transform: scale(1.04);
        opacity: 1;
      }
    }

    @keyframes flame-flicker {
      0%,
      100% {
        transform: rotate(24deg) scale(0.96);
      }
      50% {
        transform: rotate(18deg) scale(1.08);
      }
    }

    @keyframes tail-sway {
      0%,
      100% {
        transform: rotate(26deg) scaleX(var(--tail-scale));
      }
      50% {
        transform: rotate(18deg) scaleX(var(--tail-scale));
      }
    }

    @keyframes wing-flutter {
      0%,
      100% {
        filter: brightness(1);
      }
      50% {
        filter: brightness(1.08);
      }
    }

    @keyframes spark-float {
      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-8px) rotate(8deg);
      }
    }

    @keyframes sacred-core-pulse {
      0%,
      100% {
        transform: translateX(-50%) scale(var(--chest-core-scale));
        box-shadow:
          0 0 0 3px rgba(255, 255, 255, 0.16),
          0 0 20px color-mix(in srgb, var(--element-ring-bloom) 76%, white 24%);
      }

      50% {
        transform: translateX(-50%) scale(calc(var(--chest-core-scale) * 1.06));
        box-shadow:
          0 0 0 4px rgba(255, 255, 255, 0.2),
          0 0 30px color-mix(in srgb, var(--element-ring-bloom) 84%, white 16%);
      }
    }

    @keyframes crown-glow {
      0%,
      100% {
        transform: translateX(-50%) scale(var(--crown-scale));
        filter: brightness(1);
      }

      50% {
        transform: translateX(-50%) translateY(-2px) scale(calc(var(--crown-scale) * 1.03));
        filter: brightness(1.08);
      }
    }

    @keyframes evolve-burst {
      0% {
        transform: translateY(0) scale(1);
        filter: drop-shadow(0 28px 42px rgba(226, 90, 22, 0.22));
      }
      50% {
        transform: translateY(-10px) scale(1.08);
        filter: drop-shadow(0 0 28px rgba(255, 203, 86, 0.72));
      }
      100% {
        transform: translateY(0) scale(1);
        filter: drop-shadow(0 28px 42px rgba(226, 90, 22, 0.22));
      }
    }

    @keyframes element-shift-flash {
      0% {
        opacity: 0;
        transform: scale(0.72);
      }
      28% {
        opacity: 0.78;
        transform: scale(1.02);
      }
      100% {
        opacity: 0;
        transform: scale(1.22);
      }
    }

    @keyframes element-shift-sweep {
      0% {
        opacity: 0;
        transform: translateX(-28%) rotate(-12deg) scale(0.82);
      }
      24% {
        opacity: 0.92;
      }
      100% {
        opacity: 0;
        transform: translateX(32%) rotate(-12deg) scale(1.08);
      }
    }

    @keyframes ring-spin {
      0% {
        transform: scale(0.94) rotate(0deg);
      }
      50% {
        transform: scale(1) rotate(180deg);
      }
      100% {
        transform: scale(0.94) rotate(360deg);
      }
    }

    @keyframes feedback-float {
      0% {
        transform: translateY(12px) scale(0.92);
      }
      16% {
        transform: translateY(0) scale(1);
      }
      72% {
        transform: translateY(-10px) scale(1);
      }
      100% {
        transform: translateY(-18px) scale(0.96);
      }
    }

    @keyframes confetti-rise {
      0% {
        transform: translateY(0) scale(0.72) rotate(0deg);
        opacity: 0;
      }
      18% {
        opacity: 0.94;
      }
      100% {
        transform: translateY(-78px) scale(1) rotate(28deg);
        opacity: 0;
      }
    }

    @keyframes rail-pulse {
      0% {
        filter: brightness(1);
        box-shadow:
          0 0 18px rgba(255, 188, 77, 0.28),
          inset 0 0 14px rgba(255, 255, 255, 0.24);
      }
      40% {
        filter: brightness(1.18);
        box-shadow:
          0 0 30px rgba(255, 188, 77, 0.42),
          inset 0 0 20px rgba(255, 255, 255, 0.38);
      }
      100% {
        filter: brightness(1);
        box-shadow:
          0 0 18px rgba(255, 188, 77, 0.28),
          inset 0 0 14px rgba(255, 255, 255, 0.24);
      }
    }

      }

      }

        linear-gradient(180deg, rgba(255, 253, 243, 0.96), rgba(255, 242, 211, 0.92));

    .evolution-card.is-locked {

        linear-gradient(180deg, rgba(249, 244, 232, 0.88), rgba(239, 231, 213, 0.82));

    .evolution-state {

    .evolution-avatar {
      width: 118px;

        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.5), transparent 16%),

        0 14px 24px rgba(226, 90, 22, 0.18);

    .evolution-avatar::before,
    .evolution-avatar::after {
      content: "";
      position: absolute;
      top: 12px;
      width: 18px;
      height: 28px;
      border-radius: 70% 70% 0 100%;
      background: linear-gradient(180deg, #ffeeb8, #ffc44d 64%, #f47c22);
      box-shadow: inset 0 4px 6px rgba(255, 255, 255, 0.22);

    .evolution-avatar::before {
      left: 22px;
      transform: rotate(-26deg);
    }

    .evolution-avatar::after {
      right: 22px;
      transform: scaleX(-1) rotate(-26deg);
    }

    .evolution-avatar.stage-1::before,

    .evolution-avatar.stage-5 {

      box-shadow: inset 0 6px 10px rgba(255, 255, 255, 0.18);

    .evolution-face::before,
    .evolution-face::after {
      content: "";

      top: 20px;
      width: 12px;
      height: 16px;
      border-radius: 999px;
      background: #fff7ed;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.36);

    .evolution-face::before {
      left: 14px;
    }

    .evolution-face::after {
      right: 14px;
    }

    .evolution-face .evo-eye-core {

      top: 24px;

      height: 14px;

      content: "";
      position: absolute;
      width: 6px;
      height: 10px;
      border-radius: 999px;
      background: #291812;
      top: 0;

    .evolution-face .evo-eye-core::before {
      left: 0;
    }

    .evolution-face .evo-eye-core::after {
      right: 0;
    }

    .evolution-avatar {
      --ea-face-width: 58%;
      --ea-face-height: 54%;
      --ea-face-top: 16%;
      --ea-neck-width: 26%;
      --ea-neck-height: 14%;
      --ea-neck-opacity: 0.9;
      --ea-horn-opacity: 0.86;
      --ea-horn-scale: 1;
      --ea-spine-opacity: 0;
      --ea-spine-scale: 0.8;
      --ea-wing-opacity: 0;
      --ea-wing-scale: 0.86;
      --ea-wing-top: 22%;
      --ea-core-opacity: 0;
      --ea-guard-opacity: 0;
      --ea-crown-opacity: 0;
      --ea-crown-scale: 0.8;
      overflow: visible;
      display: block;
      place-items: initial;

    .evolution-avatar::before,
    .evolution-avatar::after {
      opacity: var(--ea-horn-opacity);
      transform: rotate(-26deg) scale(var(--ea-horn-scale));
      transform-origin: bottom center;
    }

    .evolution-avatar::after {
      transform: scaleX(-1) rotate(-26deg) scale(var(--ea-horn-scale));
    }

    .evolution-avatar .evolution-neck {
      position: absolute;
      left: 50%;
      top: 34%;
      width: var(--ea-neck-width);
      height: var(--ea-neck-height);
      transform: translateX(-50%);
      border-radius: 999px 999px 18px 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.26), transparent 30%),
        linear-gradient(180deg, #ffba61, #ff8440 70%, #dd5922);
      opacity: var(--ea-neck-opacity);
      z-index: 1;
    }

    .evolution-avatar .evolution-neck::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 10%;
      width: 24%;
      height: 72%;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), transparent 86%);

    .evolution-avatar .evolution-spines {
      position: absolute;
      left: 50%;
      top: 8%;
      width: 44%;
      height: 22%;
      transform: translateX(-50%) scale(var(--ea-spine-scale));
      opacity: var(--ea-spine-opacity);
      z-index: 1;
    }

    .evolution-avatar .evolution-spines span {
      position: absolute;
      bottom: 0;
      width: 16%;
      background: linear-gradient(180deg, #fff8d4, #ffc44d 62%, #f47c22);
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.18);

    .evolution-avatar .evolution-spines span:nth-child(1) {
      left: 8%;
      height: 44%;
      transform: rotate(-16deg);
    }

    .evolution-avatar .evolution-spines span:nth-child(2) {
      left: 30%;
      height: 68%;
      transform: rotate(-6deg);
    }

    .evolution-avatar .evolution-spines span:nth-child(3) {
      right: 30%;
      height: 68%;
      transform: rotate(6deg);
    }

    .evolution-avatar .evolution-spines span:nth-child(4) {
      right: 8%;
      height: 44%;
      transform: rotate(16deg);
    }

    .evolution-avatar .evolution-wings {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .evolution-avatar .evolution-wings::before,
    .evolution-avatar .evolution-wings::after {
      content: "";
      position: absolute;
      top: var(--ea-wing-top);
      width: 42%;
      height: 48%;
      background: linear-gradient(180deg, rgba(255, 239, 204, 0.95), rgba(255, 182, 82, 0.96) 54%, rgba(225, 93, 34, 0.98));
      clip-path: polygon(0 0, 100% 18%, 86% 100%, 18% 78%, 0 42%);
      opacity: var(--ea-wing-opacity);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
    }

    .evolution-avatar .evolution-wings::before {
      left: 4%;
      transform: rotate(-26deg) scaleX(-1) scale(var(--ea-wing-scale));
      transform-origin: right bottom;
    }

    .evolution-avatar .evolution-wings::after {
      right: 4%;
      transform: rotate(18deg) scale(var(--ea-wing-scale));
      transform-origin: left bottom;
    }

    .evolution-avatar .evolution-face {
      position: absolute;
      left: 50%;
      top: var(--ea-face-top);
      width: var(--ea-face-width);
      height: var(--ea-face-height);
      transform: translateX(-50%);

    .evolution-avatar .evolution-chest-core {
      position: absolute;
      left: 50%;
      top: 58%;
      width: 18%;
      height: 18%;
      transform: translateX(-50%);
      border-radius: 40% 40% 52% 52%;
      background:
        radial-gradient(circle at 36% 30%, rgba(255, 255, 255, 0.94), transparent 22%),

      box-shadow: 0 0 14px rgba(255, 181, 72, 0.28);

      z-index: 3;
    }

    .evolution-avatar .evolution-guard {
      position: absolute;
      bottom: 10%;
      width: 18%;
      height: 24%;
      border-radius: 18px 18px 12px 12px;
      background: linear-gradient(180deg, rgba(255, 244, 214, 0.96), rgba(255, 195, 98, 0.92) 54%, rgba(196, 89, 37, 0.94));
      border: 1px solid rgba(255, 255, 255, 0.26);
      box-shadow: 0 6px 12px rgba(106, 56, 18, 0.14);
      opacity: var(--ea-guard-opacity);
      z-index: 2;

    .evolution-avatar .evolution-guard-left {
      left: 16%;
      transform: rotate(8deg);
    }

    .evolution-avatar .evolution-guard-right {
      right: 16%;
      transform: rotate(-8deg);
    }

    .evolution-avatar .evolution-crown {
      position: absolute;
      left: 50%;
      top: -8%;
      width: 40%;
      height: 20%;
      transform: translateX(-50%) scale(var(--ea-crown-scale));
      transform-origin: center bottom;
      opacity: var(--ea-crown-opacity);
      z-index: 4;
    }

    .evolution-avatar .evolution-crown::before,
    .evolution-avatar .evolution-crown::after,
    .evolution-avatar .evolution-crown span {
      content: "";
      position: absolute;
      bottom: 0;
      width: 24%;
      background: linear-gradient(180deg, #fffce6, #ffd76b 58%, #ff9e43);
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .evolution-avatar .evolution-crown::before {
      left: 6%;
      height: 54%;
    }

    .evolution-avatar .evolution-crown::after {
      right: 6%;
      height: 54%;
    }

    .evolution-avatar .evolution-crown span {
      left: 38%;
      width: 24%;
      height: 86%;
    }

    .evolution-avatar.stage-1 {

      }

    .pet-stage-mount {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;

      overflow: visible;
      animation: petBreath 3.4s ease-in-out infinite;

    @keyframes petBreath {

    /* ── Task 5: evolution animation overlay ── */
    .evo-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      border-radius: inherit;
      overflow: hidden;
    }

    .evo-glow {
      position: absolute;
      inset: -20%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,230,140,0.9) 0%, rgba(255,190,60,0.0) 70%);
      animation: evo-Glow 2.2s ease-in-out forwards;
    }

    .evo-ring {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 3px solid rgba(95,224,255,0.7);
      animation: evo-Ring 2.2s ease-in-out forwards;
    }

    .evo-rays {
      position: absolute;
      inset: 0;
      background:
        conic-gradient(
          from 0deg,
          transparent 0deg 22deg,  rgba(255,222,122,0.55) 22deg 28deg,
          transparent 28deg 52deg, rgba(255,222,122,0.45) 52deg 58deg,
          transparent 58deg 82deg, rgba(255,222,122,0.50) 82deg 88deg,
          transparent 88deg 112deg,rgba(255,222,122,0.45) 112deg 118deg,
          transparent 118deg 142deg,rgba(255,222,122,0.55) 142deg 148deg,
          transparent 148deg 172deg,rgba(255,222,122,0.45) 172deg 178deg,
          transparent 178deg 202deg,rgba(255,222,122,0.50) 202deg 208deg,
          transparent 208deg 232deg,rgba(255,222,122,0.45) 232deg 238deg,
          transparent 238deg 262deg,rgba(255,222,122,0.55) 262deg 268deg,
          transparent 268deg 292deg,rgba(255,222,122,0.45) 292deg 298deg,
          transparent 298deg 322deg,rgba(255,222,122,0.50) 322deg 328deg,
          transparent 328deg 360deg
        );
      border-radius: 50%;
      animation: evo-Rays 2.2s ease-out forwards;
    }

    .evo-flash {
      position: absolute;
      inset: -5%;
      background: radial-gradient(circle, #ffffff 0%, rgba(255,243,208,0.85) 55%, rgba(255,243,208,0) 100%);
      animation: evo-Flash 2.2s ease-in-out forwards;
    }

    .evo-spark {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 28% 35%, rgba(255,240,168,0.85) 0%, transparent 6%),
        radial-gradient(circle at 72% 30%, rgba(255,240,168,0.75) 0%, transparent 5%),
        radial-gradient(circle at 55% 68%, rgba(255,240,168,0.70) 0%, transparent 5%),
        radial-gradient(circle at 22% 65%, rgba(255,240,168,0.75) 0%, transparent 4%);
      animation: evo-Spark 2.2s ease-out forwards;
    }

    .evo-old-shake {
      animation: evo-OldShake 0.9s ease-in-out forwards !important;
    }

    @keyframes evo-OldShake {
      0%   { transform: translateY(0) scale(1); filter: drop-shadow(0 28px 42px rgba(226,90,22,0.22)); }
      10%  { transform: translateX(-2px); }
      16%  { transform: translateX(2px); }
      22%  { transform: translateX(-2px); }
      28%  { transform: translateX(3px); }
      34%  { transform: translateX(-3px); }
      38%  { opacity: 1; transform: translateX(0); filter: drop-shadow(0 0 42px rgba(255,213,102,0.7)); }
      48%  { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes evo-Glow {
      0%   { opacity: 0; transform: scale(0.8); }
      40%  { opacity: 0.95; transform: scale(1); }
      48%  { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes evo-Ring {
      0%   { opacity: 0.25; transform: scale(1.15); }
      40%  { opacity: 0.70; transform: scale(0.7); }
      49%  { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes evo-Rays {
      0%, 42% { opacity: 0; transform: scale(0.3) rotate(0deg); }
      53%     { opacity: 0.85; }
      72%     { opacity: 0; transform: scale(1.5) rotate(20deg); }
      100%    { opacity: 0; }
    }

    @keyframes evo-Flash {
      0%, 42% { opacity: 0; }
      49%     { opacity: 1; }
      64%     { opacity: 0; }
      100%    { opacity: 0; }
    }

    @keyframes evo-Spark {
      0%, 60% { opacity: 0; transform: scale(0.5); }
      70%     { opacity: 1; transform: scale(1); }
      90%     { opacity: 0.9; }
      97%,100%{ opacity: 0; }
    }
    /* ── end Task 5 ── */

    .pet-speech-bubble {
      position: absolute;
      left: 50%;
      top: 18px;
      max-width: min(260px, calc(100% - 52px));
      padding: 11px 16px;
      border-radius: 20px;
      background: rgba(38, 28, 20, 0.88);
      color: #fff5de;
      font-size: 0.86rem;
      font-weight: 900;
      line-height: 1.35;
      text-align: center;
      opacity: 0;
      transform: translate(-50%, -8px) scale(0.9);
      transform-origin: center bottom;
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      box-shadow: 0 18px 28px rgba(38, 28, 20, 0.16);
      z-index: 4;
    }

    .pet-speech-bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      width: 16px;
      height: 16px;
      background: inherit;
      transform: translateX(-50%) rotate(45deg);
      border-radius: 4px;
    }

    .pet-speech-bubble.is-visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
      animation: bubble-hover 2.1s ease-in-out 1;
    }

    .pet-speech-bubble[data-tone="feed"] {
      background: linear-gradient(180deg, rgba(255, 142, 62, 0.98), rgba(226, 90, 25, 0.95));
    }

    .pet-speech-bubble[data-tone="nap"] {
      background: linear-gradient(180deg, rgba(96, 116, 164, 0.96), rgba(54, 70, 112, 0.94));
    }

    .pet-speech-bubble[data-tone="evolve"] {
      background: linear-gradient(180deg, rgba(82, 64, 196, 0.98), rgba(25, 112, 219, 0.95));
    }

    .pet-speech-bubble[data-tone="pet"] {
      background: linear-gradient(180deg, rgba(51, 177, 151, 0.96), rgba(22, 132, 117, 0.94));
    }

    .pet-stage-banner {
      position: absolute;
      left: 18px;
      bottom: 18px;
      display: grid;
      gap: 4px;
      padding: 14px 16px;
      min-width: 144px;
      border-radius: 20px;
      background: rgba(255, 250, 239, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.88);
      box-shadow: 0 12px 24px rgba(92, 63, 23, 0.08);
      backdrop-filter: blur(12px);
      z-index: 3;
    }

    .pet-stage-level {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-width: 62px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255, 210, 128, 0.34);
      color: #7a4a13;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 900;
    }

    .pet-stage-hero-name {
      font-size: 1.08rem;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #3b2617;
    }

    .pet-action-row {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      display: inline-flex;
      gap: 10px;
      align-items: center;
      z-index: 2;
    }

    .pet-side-button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 252, 244, 0.92);
      color: #5f431f;
      font-weight: 900;
      font-size: 0.82rem;
      box-shadow: 0 14px 24px rgba(96, 68, 26, 0.1);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
      border: 1px solid rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .pet-side-button:hover,
    .pet-side-button:focus-visible {
      transform: translateY(-1px);
      background: rgba(255, 247, 226, 0.98);
      box-shadow: 0 16px 28px rgba(96, 68, 26, 0.14);
    }

    .pet-side-button:focus-visible {
      outline: 2px solid rgba(255, 217, 112, 0.9);
      outline-offset: 3px;
    }

    @keyframes pet-shell-burst {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      35% {
        transform: translateY(-8px) scale(1.035);
      }

      70% {
        transform: translateY(-2px) scale(1.012);
      }
    }

    @keyframes bubble-hover {
      0% {
        transform: translate(-50%, 4px) scale(0.96);
      }

      25% {
        transform: translate(-50%, -2px) scale(1);
      }

      55% {
        transform: translate(-50%, 0) scale(1);
      }

      100% {
        transform: translate(-50%, -1px) scale(0.98);
      }
    }

    @media (max-width: 1100px) {
      .pet-wrap {
        min-height: 0;
      }

      .pet-core {
        width: min(100%, 520px);
        height: 360px;
      }

      .pet-action-row {
        position: static;
        transform: none;
        justify-content: center;
        width: 100%;
      }

    }

    @media (max-width: 760px) {
      .pet-core {
        height: 320px;
      }

      .pet-3d-stage {
        border-radius: 28px;
      }

      .pet-stage-banner {
        left: 12px;
        bottom: 12px;
        padding: 12px 14px;
      }

      .pet-action-row {
        width: 100%;
      }

      .pet-side-button {
        flex: 1 1 0;
        justify-content: center;
      }
    }

    /* ── Task 9: Pet Selection Overlay ──────────────────────────────────── */
    .pet-select-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(8, 18, 32, 0.96);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 24px 16px 32px;
      box-sizing: border-box;
    }

    .pet-select-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #E8F4FF;
      margin: 0 0 8px;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .pet-select-subtitle {
      font-size: 0.85rem;
      color: #7AABCC;
      margin: 0 0 28px;
      text-align: center;
    }

    .pet-select-row {
      display: flex;
      flex-direction: row;
      gap: 12px;
      width: 100%;
      max-width: 420px;
      justify-content: center;
      align-items: stretch;
    }

    .pet-select-card {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 8px 14px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      min-height: 160px;
      color: inherit;
      font-family: inherit;
    }

    .pet-select-card:hover,
    .pet-select-card:focus-visible {
      border-color: var(--accent, #FF7A37);
      background: color-mix(in srgb, var(--accent, #FF7A37) 12%, transparent);
      transform: translateY(-2px);
      outline: none;
    }

    .pet-select-card:active {
      transform: translateY(0px) scale(0.97);
    }

    .pet-select-card svg {
      width: 72px;
      height: 94px;
      flex-shrink: 0;
    }

    .pet-select-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #E8F4FF;
      text-align: center;
    }

    .pet-select-personality {
      font-size: 0.7rem;
      color: #7AABCC;
      text-align: center;
      line-height: 1.35;
      padding: 0 2px;
    }

    @media (max-width: 380px) {
      .pet-select-card svg {
        width: 56px;
        height: 73px;
      }
      .pet-select-name {
        font-size: 0.8rem;
      }
      .pet-select-personality {
        font-size: 0.65rem;
      }
      .pet-select-row {
        gap: 8px;
      }
    }
  </style>
</head>
<body>

<!-- ═══════════ FIRE DRAGON 5-STAGE SPRITE SHEET ═══════════
     Shared defs use prefix pg- to avoid colliding with any other SVG on the page.
     viewBox "-12 -8 130 148" gives generous padding:
       - wings extend to roughly x=-4 (stage 4/5) so -12 is safe
       - flames extend to x≈118 in stage 5 (mapped), -12+130=118 ok
       - horns reach y≈-5 in stage 5, -8 safe
       - body bottom ≈ y 122-128, + shadow ≈ 130, so 140 total covers all
-->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <radialGradient id="pg-dBody" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FF7A45"/>
      <stop offset="60%" stop-color="#E8461F"/>
      <stop offset="100%" stop-color="#9E240E"/>
    </radialGradient>
    <linearGradient id="pg-dHorn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE8C4"/>
      <stop offset="100%" stop-color="#C9A06A"/>

    <radialGradient id="pg-dFlame" cx="50%" cy="80%" r="80%">

      <stop offset="100%" stop-color="#E7A96F"/>
    </radialGradient>
    <filter id="pg-dGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Stage 1: Egg — original translate(31,129.4) scale(0.48) stripped; shapes kept local -->
  <symbol id="sp-dragon-1" viewBox="-12 -8 130 148">
    <ellipse cx="50" cy="125" rx="15" ry="4" fill="#000" opacity="0.22"/>

  <symbol id="sp-dragon-4" viewBox="-12 -8 130 148">

  <!-- Stage 5: Fire Adult — original translate(430,-3.16) scale(1.62) stripped -->
  <!-- Fire breath extends to x≈118, left wing to x≈-2; viewBox "-12 -8 140 148" captures it all -->
  <symbol id="sp-dragon-5" viewBox="-12 -8 140 148">
    <ellipse cx="50" cy="125" rx="54" ry="6" fill="#000" opacity="0.22"/>

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function lerp(start, end, amount) {
      return start + (end - start) * amount;
    }

    function easeInOutSine(value) {
      return -(Math.cos(Math.PI * value) - 1) / 2;
    }

    function hexToRgb(hex) {
      const normalized = hex.replace("#", "");
      const source = normalized.length === 3
        ? normalized.split("").map((part) => part + part).join("")
        : normalized;
      const intValue = Number.parseInt(source, 16);
      return {
        r: (intValue >> 16) & 255,
        g: (intValue >> 8) & 255,
        b: intValue & 255
      };
    }

    function rgbToHex(rgb) {
      const toHex = (value) => clamp(Math.round(value), 0, 255).toString(16).padStart(2, "0");
      return `#${toHex(rgb.r)}${toHex(rgb.g)}${toHex(rgb.b)}`;
    }

    function mixHex(source, target, weight = 0.5) {
      const a = hexToRgb(source);
      const b = hexToRgb(target);
      return rgbToHex({
        r: a.r + (b.r - a.r) * weight,
        g: a.g + (b.g - a.g) * weight,
        b: a.b + (b.b - a.b) * weight
      });
    }

    function shadeHex(hex, factor = 1) {
      const rgb = hexToRgb(hex);
      return rgbToHex({
        r: rgb.r * factor,
        g: rgb.g * factor,
        b: rgb.b * factor
      });
    }

    function rgba(hex, alpha = 1) {
      const rgb = hexToRgb(hex);
      return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)] ?? "";
    }

    function getNextStageMeta() {
      // Returns the next SPECIES stage object, or null when already at max level.
      if (state.level >= 5) return null;
      return getSpecies().stages[state.level]; // stages is 0-indexed; stages[level] = next
    }

    function canEvolve() {
      const currentStage = getStageMeta();
      return currentStage.nextGrowth !== null && state.growth >= currentStage.nextGrowth;

    function getRewardGlyph(rewardName = "") {
      if (/[\u6676\u77FF\u77F3\u91D1\u5E01]/.test(rewardName)) return "\uD83D\uDC8E";
      if (/[\u4E66\u7B7E\u7FBD\u53F7]/.test(rewardName)) return "\u2726";
      if (/[\u7CD6\u997C\u70B9\u5FC3\u9EA6\u996D\u56E2]/.test(rewardName)) return "\uD83C\uDF6A";
      if (/\u6273\u624B/.test(rewardName)) return "\u2692\uFE0F";
      if (/[\u679C\u8393\u6843\u51BB]/.test(rewardName)) return "\uD83C\uDF4E";
      return "\uD83C\uDF56";
    }

    function launchFeedProjectile(rewardName) {
      const source = rewardIcons.querySelector(".reward-drop:not(.is-empty)") ?? rewardBanner;

      const sourceRect = source.getBoundingClientRect();
      const targetRect = petCore.getBoundingClientRect();
      const flyingDrop = document.createElement("div");
      flyingDrop.className = "flying-drop";
      flyingDrop.textContent = getRewardGlyph(rewardName);
      flyingDrop.style.left = `${sourceRect.left + sourceRect.width / 2}px`;
      flyingDrop.style.top = `${sourceRect.top + sourceRect.height / 2}px`;
      flyingDrop.style.setProperty("--fly-x", `${targetRect.left + targetRect.width * 0.56 - (sourceRect.left + sourceRect.width / 2)}px`);
      flyingDrop.style.setProperty("--fly-y", `${targetRect.top + targetRect.height * 0.34 - (sourceRect.top + sourceRect.height / 2)}px`);
      document.body.appendChild(flyingDrop);
      rewardBanner.classList.add("is-feeding");

      requestAnimationFrame(() => {
        flyingDrop.classList.add("is-flying");

      window.setTimeout(() => {

      const visibleRewards = state.rewardQueue.slice(0, 3);

      rewardIcons.classList.toggle("is-empty", state.rewardQueue.length === 0);

    // Task 6: 5-stage same-baseline size-staircase SVG rail
    function renderEvolutionRail() {
      const stages = getSpecies().stages;
      const GROUND = 188, VB_W = 640;

               `<text x="${cx[i]}" y="205" text-anchor="middle" fill="#3A5568" font-size="12">${s.name}${s.reveal ? ' ★' : ''}</text>`;

    function getDayStatusMeta(day, index) {
      if (day.restDay) return { label: "休息", tone: "rest" };
      const doneCount = day.tasks.filter((task) => task.done).length;
      if (index === todayIndex) {
        if (doneCount === day.tasks.length && day.tasks.length > 0) {
          return { label: "已完成", tone: "complete" };
        }
        return doneCount > 0
          ? { label: "进行中", tone: "active" }
          : { label: "待开始", tone: "pending" };
      }
      if (doneCount === 0) {
        return index < todayIndex
          ? { label: "未开", tone: "locked" }
          : { label: "待战", tone: "future" };
      }
      if (doneCount === day.tasks.length) return { label: "已攻克", tone: "complete" };
      return { label: "进行中", tone: "active" };
    }

    function getStars(doneCount, totalCount, isRestDay) {
      if (isRestDay || totalCount === 0) return 0;
      return Math.ceil((doneCount / totalCount) * 5);
    }

    function completeTask(dayKey, taskId, rewardName) {
      const day = weekData.find((entry) => entry.key === dayKey);
      const task = day.tasks.find((entry) => entry.id === taskId);

      if (!task || task.done) {
        return;
      }

      task.done = true;
      state.rewardQueue.push(rewardName);
      state.lastFeed = "";
      const summaryParts = [`${rewardName} +1`];
      let dragonCopy = "补给到手！";

      if (canEvolve()) {
        state.lastFeed = "已满足进化";
        scheduleEvolutionCue();
        dragonCopy = "成长值满了！";
      }

      state.lastReward = summaryParts.join(" / ");
      showSpeechBubble(dragonCopy, "talk");
      render();
    }

    function feedPet() {
      if (state.rewardQueue.length === 0) {
        state.lastFeed = "\u53BB\u62FF\u8865\u7ED9";
        showSpeechBubble("先完成委托，我再吃补给！", "talk");
        render();
        return;
      }

      const rewardName = state.rewardQueue.shift();
      state.lastReward = "";
      state.growth = Math.min(100, state.growth + 12);
      state.lastFeed = "\u6210\u957F+12";
      launchFeedProjectile(rewardName);
      pulseGrowthRail();
      showPetFeedback("\u6210\u957F+12", "growth");
      showSpeechBubble(`${rewardName} 真香！`, "feed");

      if (canEvolve()) {
        state.lastFeed = "\u5DF2\u6EE1\u8DB3\u8FDB\u5316";
        scheduleEvolutionCue();
      }

      render(true);
    }

    function evolvePet() {
      if (!canEvolve()) {
        state.lastFeed = "\u8FD8\u5DEE\u4E00\u70B9";
        showSpeechBubble("再喂我一点点，我们就能进化！", "talk");
        render();
        return;
      }

      const currentStage = getStageMeta();
      const nextStage = getNextStageMeta();

      state.growth = 18;
      state.level += 1;
      state.lastReward = "";
      state.lastFeed = `${currentStage.name} -> ${nextStage.name}`;
      pulseGrowthRail();
      showPetFeedback("\u8FDB\u5316\uFF01", "evolve");
      showSpeechBubble(`${nextStage.name}，登场！`, "evolve");

      petCore.classList.add("is-evolving");
      window.setTimeout(() => {
        petCore.classList.remove("is-evolving");
      }, 1400);

      render(true);
    }

    function getSelectedDay() {
      return weekData[state.selectedIndex];
    }

    // Task 4: SVG pet stage renderer
    const petStageMount = document.getElementById("petStageMount");
    // Guard flag: renderPetStage() is a no-op until species is decided (saved or chosen).
    // Prevents a flash of the default dragon before the selection overlay.
    let _petSpeciesReady = false;

    // 每个物种的舞台光晕基色(RGB) — 火龙暖金 / 恐龙绿 / 光之英雄蓝青，避免撞色
    const PET_STAGE_GLOW = { dragon: "255, 170, 70", dino: "96, 200, 96", hero: "96, 208, 245" };

    function renderPetStage() {
      if (!petStageMount) return;
      if (!_petSpeciesReady) return;
      const stage = getCurrentStage();
      const species = getSpecies();
      // Preserve any evolution overlay that may be appended (Task 5: overlay/innerHTML fix)
      const existingOverlay = petStageMount.querySelector(".evo-overlay");
      petStageMount.innerHTML =
        `<svg class="pet-stage-svg" viewBox="-12 -8 140 148" role="img" aria-label="${species.name}·${stage.name}">
           ${petArtMarkup(stage.spriteId, null)}
         </svg>`;
      petStageMount.style.setProperty("--accent", species.accent || "#FF7A37");
      // 让舞台光晕/光环跟随物种身份色，避免蓝(光之英雄)/绿(恐龙)宠物配暖金光晕撞色
      const petWrapEl = petStageMount.closest(".pet-wrap") || document.querySelector(".pet-wrap");
      if (petWrapEl) {
        const glow = PET_STAGE_GLOW[species.id] || PET_STAGE_GLOW.dragon;
        petWrapEl.style.setProperty("--element-glow", `rgba(${glow}, 0.5)`);
        petWrapEl.style.setProperty("--element-glow-soft", `rgba(${glow}, 0.08)`);
        petWrapEl.style.setProperty("--element-ring", `rgba(${glow}, 0.36)`);
        petWrapEl.style.setProperty("--element-ring-shadow", `rgba(${glow}, 0.09)`);
        petWrapEl.style.setProperty("--element-ring-bloom", `rgba(${glow}, 0.16)`);
        petWrapEl.style.setProperty("--stage-glow", `rgba(${glow}, 0.16)`);
        petWrapEl.style.setProperty("--stage-glow-soft", `rgba(${glow}, 0.07)`);
      }
      // Re-append overlay if it was present (innerHTML wipe would have removed it)
      if (existingOverlay) {
        petStageMount.appendChild(existingOverlay);
      }
    }

    // Task 5: 4-beat evolution animation
    // Beat 1 (0–900ms):   old form glows + shakes, energy ring contracts
    // Beat 2 (~900ms):    white flash peaks
    // Beat 3 (~1050ms):   at flash peak swap sprite; flash fades + burst rays
    // Beat 4 (~1400ms+):  sparkles + reveal speech bubble
    let _isEvolving = false;
    function playEvolution(nextLevel) {
      if (_isEvolving) return;
      _isEvolving = true;
      // 动画期间强制隐藏进化卡片（盖过 :hover / :focus-within），避免挡住舞台演出
      petEvolutionShell.classList.add("is-evolving");
      if (document.activeElement && document.activeElement.blur) document.activeElement.blur();

      // Build the overlay div with all animation layers
      const overlay = document.createElement("div");
      overlay.className = "evo-overlay";
      overlay.innerHTML = `
        <div class="evo-glow"></div>
        <div class="evo-ring"></div>
        <div class="evo-rays"></div>
        <div class="evo-flash"></div>
        <div class="evo-spark"></div>
      `;

      // Append overlay to petStageMount (above the SVG, z-index:10)
      petStageMount.appendChild(overlay);

      // Beat 1: shake the pet-core element
      petCore.classList.add("evo-old-shake");

      // Beat 3: at flash peak (~1050ms) swap the sprite
      // renderPetStage() is called which does innerHTML reset; our modified
      // renderPetStage() re-appends the overlay node so it survives.
      window.setTimeout(() => {
        state.level = nextLevel;
        state.growth = 18;
        renderPetStage(); // overlay is re-appended inside this call
      }, 1050);

      // Beat 4: cleanup at ~2200ms, show reveal speech bubble
      window.setTimeout(() => {
        petCore.classList.remove("evo-old-shake");
        // Remove overlay (it may have been re-appended by renderPetStage)
        const liveOverlay = petStageMount.querySelector(".evo-overlay");
        if (liveOverlay) liveOverlay.remove();
        _isEvolving = false;
        petEvolutionShell.classList.remove("is-evolving");

        // Refresh growth bar, level badge, evolution panel to new level
        render();

        const reveal = getCurrentStage().reveal;
        if (reveal) {
          showSpeechBubble(reveal, "evolve", 2800);
        }
      }, 2200);
    }

    function renderStage(animateHappy) {
      const selectedDay = getSelectedDay();
      const doneCount = selectedDay.tasks.filter((task) => task.done).length;
      const totalCount = selectedDay.tasks.length;
      const isRestDay = selectedDay.restDay;
      const stars = getStars(doneCount, totalCount, isRestDay);
      const queueCount = state.rewardQueue.length;
      const hasQueue = queueCount > 0;
      const currentStage = getStageMeta();
      const nextStage = getNextStageMeta();
      const evolutionReady = canEvolve();
      const currentStageName = currentStage.name;
      let petMode = "idle";

      selectedDayLabel.textContent = `${selectedDay.fullLabel} / ${selectedDay.date}`;
      progressValue.textContent = isRestDay ? "\u4F11\u606F\u65E5" : `${doneCount}/${totalCount}`;
      starsValue.textContent = `${stars}`;
      streakValue.textContent = `${state.streak}\u5929`;
      badgeLevel.textContent = `${state.level}`;
      growthFill.style.width = `${state.growth}%`;
      growthPercent.textContent = `${state.growth}%`;
      growthPoints.textContent = `\u6210\u957F\u503C ${state.growth} / 100`;
      petCore.dataset.stage = String(state.level);
      petStageName.textContent = currentStageName;
      petHeroLevel.textContent = `Lv ${state.level}`;
      petHeroStageName.textContent = currentStageName;
      profileSubtitle.textContent = `今天继续带着${currentStageName}完成委托。`;

      if (currentStage.level === 5) {
        petEvolutionHint.textContent = "\u6700\u7EC8\u5F62\u6001";
        petEvolutionTrigger.textContent = "\u5DF2\u6EE1\u7EA7";
        growthHint.textContent = "\u5DF2\u6EE1\u7EA7";
        evolveButton.hidden = true;
      } else if (evolutionReady) {
        petEvolutionHint.textContent = `\u70B9\u6B64\u8FDB\u5316\u4E3A ${nextStage.name}`;
        petEvolutionTrigger.textContent = "\u53EF\u8FDB\u5316";
        growthHint.textContent = "\u70B9\u51FB\u8FDB\u5316";
        evolveButton.hidden = false;
        evolveButton.textContent = `\u8FDB\u5316\u6210 ${nextStage.name}`;
      } else {
        const growthLeft = Math.max(currentStage.nextGrowth - state.growth, 0);
        petEvolutionHint.textContent = `\u5DEE ${growthLeft} \u6210\u957F\u503C \u5230\u300C${nextStage.name}\u300D`;
        petEvolutionTrigger.textContent = "\u8FDB\u5316";
        growthHint.textContent = "\u6BCF\u6B21\u6295\u5582 +12";
        evolveButton.hidden = true;
      }

      renderEvolutionGallery();
      petCore.classList.toggle("is-happy", Boolean(animateHappy || hasQueue));

      if (isRestDay) {
        petMode = "rest";
        petMoodTag.textContent = "\u4FEE\u6574";
      } else if (evolutionReady) {
        petMode = "evolve";
        petMoodTag.textContent = "\u53EF\u8FDB\u5316";
      } else if (doneCount === 0) {
        petMode = "idle";
        petMoodTag.textContent = "\u5F85\u547D";
      } else if (doneCount < totalCount) {
        petMode = hasQueue ? "hungry" : "ready";
        petMoodTag.textContent = hasQueue ? "\u5F85\u5582" : "\u8FDB\u884C\u4E2D";
      } else {
        petMode = "complete";
        petMoodTag.textContent = hasQueue ? "\u5F85\u5582" : "\u6EE1\u72B6\u6001";
      }

      state.petMode = petMode;
      petWrap.dataset.mode = petMode;
      petCore.dataset.mode = petMode;
      renderPetStage(); // Task 4: update pet SVG sprite when stage/mood changes
      renderRewardQueue();

      if (state.lastFeed) {
        rewardCopy.textContent = state.lastFeed;
      } else if (state.lastReward) {
        rewardCopy.textContent = state.lastReward;
      } else if (hasQueue) {
        rewardCopy.textContent = `\u5F85\u6295\u5582 ${queueCount} \u4EFD`;
      } else {
        rewardCopy.textContent = "\u53BB\u62FF\u8865\u7ED9";
      }

      feedButton.textContent = queueCount > 1 ? `\u5582\u7ED9\u4F19\u4F34 x${queueCount}` : "\u5582\u7ED9\u4F19\u4F34";
      feedButton.disabled = queueCount === 0;
      petFeedShortcut.textContent = queueCount === 0 ? "\u5F85\u8865\u7ED9" : queueCount > 1 ? `\u5582\u98DFx${queueCount}` : "\u5582\u98DF";
      petFeedShortcut.disabled = queueCount === 0;
      petFeedShortcut.classList.toggle("is-empty", queueCount === 0);
    }

    function render(animateHappy = false) {
      renderDayStrip();
      renderTasks(getSelectedDay());
      renderStage(animateHappy);
    }

    // ── Task 9: Pet Selection Overlay ────────────────────────────────────────

    const PERSONALITY = {
      dragon: '火龙 · 会喷火的战龙',
      dino:   '恐龙 · 称霸的霸王龙',
      hero:   '光之英雄 · 守护的光之巨神',
    };

    function openPetSelect() {
      const cards = Object.values(SPECIES).map(sp =>
        `<button class="pet-select-card" data-id="${sp.id}" style="--accent:${sp.accent}" type="button">
           <svg viewBox="-12 -8 130 148" role="img" aria-label="${sp.name}">${petArtMarkup(sp.stages[0].spriteId, null)}</svg>
           <span class="pet-select-name">${sp.name}</span>
           <span class="pet-select-personality">${PERSONALITY[sp.id] || sp.name}</span>
         </button>`).join('');
      const ov = document.createElement('div');
      ov.id = 'petSelectOverlay';
      ov.className = 'pet-select-overlay';
      ov.innerHTML =
        `<h2 class="pet-select-title">选择你的伙伴</h2>` +
        `<p class="pet-select-subtitle">它将陪你完成每一天的任务</p>` +
        `<div class="pet-select-row">${cards}</div>`;
      document.body.appendChild(ov);
      ov.querySelectorAll('.pet-select-card').forEach(b =>
        b.addEventListener('click', () => choosePet(b.dataset.id)));
    }

    function choosePet(id) {
      if (!SPECIES[id]) return;
      state.speciesId = id;
      state.level = 1;
      try { localStorage.setItem('hw_pet_species', id); } catch (e) {}
      document.getElementById('petSelectOverlay')?.remove();
      _petSpeciesReady = true;
      render();
    }

    (function initPet() {
      const saved = (function() {
        try { return localStorage.getItem('hw_pet_species'); } catch(e) { return null; }
      }());
      if (saved && SPECIES[saved]) {
        state.speciesId = saved;
        state.level = state.level || 1;
        _petSpeciesReady = true;
        render(); // normal full render — species already set
      } else {
        // First visit: show overlay, then run render() for non-pet UI,
        // but renderPetStage() is guarded and won't fire (no flash).
        render();
        openPetSelect();
      }
    }());

    // Task 3: 页面初始化后立即探测位图资产（并行 HTTP HEAD via Image probe）
    preloadHiResArt();

    // Tap the pet stage area — handler on pet3dStage (the visual container that
    // covers petStageMount) so the click always reaches the listener on mobile.
    const pet3dStage = document.getElementById("pet3dStage");
    if (pet3dStage) {
      pet3dStage.addEventListener("click", () => {
        const bankKey = state.rewardQueue.length > 0 ? "hungry" : state.petMode === "complete" ? "complete" : state.petMode === "evolve" ? "evolve" : state.petMode === "rest" ? "rest" : "pet";
        showSpeechBubble(pick(dragonVoiceBank[bankKey] ?? dragonVoiceBank.pet), "pet");
      });
    }
    feedButton.addEventListener("click", feedPet);
    petTalkButton.addEventListener("click", (event) => {
      event.stopPropagation();
      setEvolutionOpen(false);
      showSpeechBubble(pick(dragonVoiceBank[state.petMode] ?? dragonVoiceBank.idle), "talk");
    });
    petNapButton.addEventListener("click", (event) => {
      event.stopPropagation();
      setEvolutionOpen(false);
      showSpeechBubble(pick(dragonVoiceBank.nap), "nap");
    });
    petFeedShortcut.addEventListener("click", (event) => {
      event.stopPropagation();
      setEvolutionOpen(false);
      feedPet();
    });
    evolveButton.addEventListener("click", () => {
      // Gate: only play evolution animation when canEvolve() is true
      if (canEvolve() && state.level < 5) {
        // 立即收起进化卡片并移除焦点，避免它挡住宠物舞台的进化演出动画
        petEvolutionShell.classList.remove("is-open");
        petEvolutionTrigger.setAttribute("aria-expanded", "false");
        evolveButton.blur();
        playEvolution(state.level + 1);
      } else {
        evolvePet(); // shows hint if not ready or already max level
      }
    });
    openEvolutionGalleryButton.addEventListener("click", (event) => {
      event.stopPropagation();
      setEvolutionOpen(false);
      renderEvolutionRail(); // Task 6: render fresh rail on every modal open
      setEvolutionModalOpen(true);
    });
    closeEvolutionModalButton.addEventListener("click", () => {
      setEvolutionModalOpen(false);
    });
    petEvolutionTrigger.addEventListener("click", (event) => {
      event.stopPropagation();
      const nextOpen = !petEvolutionShell.classList.contains("is-open");
      setEvolutionOpen(nextOpen);
    });
    petEvolutionShell.addEventListener("mouseleave", () => {
      setEvolutionOpen(false);
    });
    document.addEventListener("click", (event) => {
      if (!petEvolutionShell.contains(event.target)) {
        setEvolutionOpen(false);
      }
      if (event.target === evolutionModal) {
        setEvolutionModalOpen(false);
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        setEvolutionOpen(false);
        setEvolutionModalOpen(false);
      }
    });
    // render() is called inside initPet() above — do NOT call it again here.
  </script>
</body>
</html>
