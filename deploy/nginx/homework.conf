# Homework —— nginx（家长端静态站 + 反代 API）
# Cloudflare 小橙云 + SSL「灵活 / Flexible」：CF 边缘对访客是 https，回源走 http:80。
# 源站只监听 80、不需要证书。请在 Cloudflare 开启「Always Use HTTPS」，把 http 访客在边缘跳 https。
# 放到 /etc/nginx/sites-available/homework，再 ln -s 到 sites-enabled，nginx -t && systemctl reload nginx。
#
# 目录约定：
#   /var/www/homework/web   前端 dist/
#   API 由 supervisor 跑在 127.0.0.1:5000
#
# ⚠️ Flexible 下 CF↔源站是明文 http（走公网）。务必用防火墙/安全组只放行 Cloudflare IP 段访问 80，
#    否则有人直连源站 IP 就是明文。更稳妥是改用 Full(strict)+源证书（见 README 第 1 节备注）。

server {
    listen 80;
    listen [::]:80;
    server_name homework.today;

    # 还原 CF 背后的真实访客 IP
    include /etc/nginx/snippets/cloudflare-realip.conf;

    root /var/www/homework/web;
    index index.html;

    # 宠物封面/精灵图/进化视频上传较大；CF 免费版请求体上限 100MB，这里留 50MB。
    client_max_body_size 50m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 后端：API / OpenIddict 令牌 / 资产 /blob / swagger → Kestrel
    location ~ ^/(api|connect|blob|swagger)(/|$) {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Flexible：CF↔源站是 http，但公网访客始终是 https（配合 CF「Always Use HTTPS」）。
        # 固定 https —— 否则后端 UseForwardedHeaders 拿到 http，OpenIddict 会拒 /connect/token。
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # 前端带哈希的静态资源可长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html 不长缓存，保证发新版能被拿到
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA history 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
