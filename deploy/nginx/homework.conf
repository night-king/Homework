# Homework —— nginx（家长端静态站 + 反代 API），Cloudflare 小橙云在前。
# 建议 Cloudflare SSL/TLS 模式：Full (strict)，并在源站装 Cloudflare Origin Certificate。
# 放到 /etc/nginx/sites-available/homework，再 ln -s 到 sites-enabled，nginx -t && systemctl reload nginx。
#
# 目录约定：
#   /var/www/homework/web   前端 dist/
#   API 由 supervisor 跑在 127.0.0.1:5000

# 80 端口：直连（非 CF）访问一律跳 https；CF Full(strict) 只走 443。
server {
    listen 80;
    listen [::]:80;
    server_name your.domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your.domain.com;

    # Cloudflare Origin Certificate（SSL/TLS → Origin Server → Create Certificate 生成）
    ssl_certificate     /etc/ssl/cloudflare/homework.pem;
    ssl_certificate_key /etc/ssl/cloudflare/homework.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 还原 CF 背后的真实访客 IP
    include /etc/nginx/snippets/cloudflare-realip.conf;

    root /var/www/homework/web;
    index index.html;

    # 宠物封面/精灵图/进化视频上传较大；CF 免费版请求体上限 100MB，这里留 50MB。
    client_max_body_size 50m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 后端：API / OpenIddict 令牌 / 资产 /blob / swagger → Kestrel
    location ~ ^/(api|connect|blob|swagger)(/|$) {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # 本 server 是 443 → https；配合应用 UseForwardedHeaders
        proxy_read_timeout 120s;
    }

    # 前端带哈希的静态资源可长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html 不长缓存，保证发新版能被拿到
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA history 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
