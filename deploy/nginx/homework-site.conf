# Homework 官网 —— nginx（Astro 静态站，根域名）
# 纯静态（无 Node 常驻），只发 dist/。Cloudflare 小橙云 + SSL「灵活 / Flexible」：边缘 https，回源 http:80。
# 源站只监听 80、不需要证书。请在 Cloudflare 开启「Always Use HTTPS」。
# 放到 /etc/nginx/sites-available/homework-site，再 ln -s 到 sites-enabled，nginx -t && systemctl reload nginx。
#
# 目录约定：
#   /var/www/homework/site   官网 dist/（frontend/site 构建产物）
#
# 应用（家长端 + API）在 app.homework.today，见 homework.conf。二者互不影响。

server {
    listen 80;
    listen [::]:80;
    server_name homework.today www.homework.today;

    # 还原 CF 背后的真实访客 IP
    include /etc/nginx/snippets/cloudflare-realip.conf;

    root /var/www/homework/site;
    index index.html;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Astro 打包的带哈希静态资源（/_astro/*）可长缓存
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 字体等 public/ 资源也长缓存
    location ~* \.(woff2?|ttf|otf|eot|svg|png|jpe?g|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Astro 默认「目录格式」：/how -> /how/index.html；同时兜底 .html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
